<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>
  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 세로 타임라인 -->
  <line x1="150" y1="80" x2="150" y2="720" stroke="#3498db" stroke-width="5"/>

  <!-- 1단계: 오늘 -->
  <g transform="translate(150, 130)">
    <circle cx="0" cy="0" r="35" fill="#2ecc71"/>
    <text x="0" y="10" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">1</text>
    <text x="60" y="10" font-family="sans-serif" font-size="32" font-weight="bold" fill="#2c3e50">오늘</text>
    <text x="60" y="50" font-family="sans-serif" font-size="24" fill="#2ecc71">설치 + 첫 대화</text>
  </g>

  <!-- 2단계: 이번 주 -->
  <g transform="translate(150, 310)">
    <circle cx="0" cy="0" r="35" fill="#3498db"/>
    <text x="0" y="10" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">2</text>
    <text x="60" y="10" font-family="sans-serif" font-size="32" font-weight="bold" fill="#2c3e50">이번 주</text>
    <text x="60" y="50" font-family="sans-serif" font-size="24" fill="#3498db">Projects 3개</text>
  </g>

  <!-- 3단계: 한 달 -->
  <g transform="translate(150, 490)">
    <circle cx="0" cy="0" r="35" fill="#9b59b6"/>
    <text x="0" y="10" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">3</text>
    <text x="60" y="10" font-family="sans-serif" font-size="32" font-weight="bold" fill="#2c3e50">한 달</text>
    <text x="60" y="50" font-family="sans-serif" font-size="24" fill="#9b59b6">Extensions</text>
  </g>

  <!-- 4단계: 3개월 -->
  <g transform="translate(150, 670)">
    <circle cx="0" cy="0" r="35" fill="#e74c3c"/>
    <text x="0" y="10" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">4</text>
    <text x="60" y="10" font-family="sans-serif" font-size="32" font-weight="bold" fill="#2c3e50">3개월</text>
    <text x="60" y="50" font-family="sans-serif" font-size="24" fill="#e74c3c">나만의 워크플로우</text>
  </g>
</svg>
