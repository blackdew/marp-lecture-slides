<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>
  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 나쁜 프롬프트 -->
  <g transform="translate(300, 180)">
    <!-- X 아이콘 -->
    <circle cx="0" cy="-80" r="40" fill="#e74c3c" opacity="0.15"/>
    <circle cx="0" cy="-80" r="30" fill="#e74c3c"/>
    <line x1="-12" y1="-92" x2="12" y2="-68" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="12" y1="-92" x2="-12" y2="-68" stroke="white" stroke-width="5" stroke-linecap="round"/>

    <!-- 나쁜 예시 박스 -->
    <rect x="-180" y="-20" width="360" height="70" rx="14" fill="white" stroke="#e74c3c" stroke-width="3"/>
    <text x="0" y="25" text-anchor="middle" font-size="30" fill="#555" font-family="sans-serif">"레포트 써줘"</text>

    <!-- 결과 -->
    <rect x="-140" y="70" width="280" height="50" rx="10" fill="#fde8e8"/>
    <text x="0" y="102" text-anchor="middle" font-size="24" fill="#e74c3c" font-family="sans-serif">→ 예측 불가능</text>
  </g>

  <!-- VS 구분선 -->
  <line x1="120" y1="400" x2="480" y2="400" stroke="#bdc3c8" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="300" y="425" text-anchor="middle" font-size="26" font-weight="bold" fill="#adb5bd" font-family="sans-serif">VS</text>

  <!-- 좋은 프롬프트 -->
  <g transform="translate(300, 580)">
    <!-- 체크 아이콘 -->
    <circle cx="0" cy="-80" r="40" fill="#2ecc71" opacity="0.15"/>
    <circle cx="0" cy="-80" r="30" fill="#2ecc71"/>
    <path d="M-12 -82 L-4 -70 L14 -94" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 좋은 예시 박스 -->
    <rect x="-200" y="-20" width="400" height="120" rx="14" fill="white" stroke="#2ecc71" stroke-width="3"/>
    <text x="-175" y="15" font-size="22" fill="#333" font-family="sans-serif">주제: 애자일 방법론</text>
    <text x="-175" y="48" font-size="22" fill="#333" font-family="sans-serif">구조: 서론-본론-결론</text>
    <text x="-175" y="81" font-size="22" fill="#333" font-family="sans-serif">분량: A4 5장, 학술적 톤</text>

    <!-- 결과 -->
    <rect x="-140" y="120" width="280" height="50" rx="10" fill="#e8f8e8"/>
    <text x="0" y="152" text-anchor="middle" font-size="24" fill="#27ae60" font-family="sans-serif">→ 원하는 결과!</text>
  </g>
</svg>
