<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 원칙 1: 구체적으로 -->
  <g transform="translate(300, 180)">
    <circle cx="0" cy="0" r="80" fill="#3498db" opacity="0.9"/>
    <circle cx="-5" cy="-10" r="22" fill="none" stroke="#fff" stroke-width="4"/>
    <line x1="12" y1="7" x2="26" y2="21" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="55" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">구체적으로</text>
  </g>

  <!-- 연결선 -->
  <line x1="300" y1="270" x2="300" y2="330" stroke="#2c3e50" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- 원칙 2: 맥락 제공 -->
  <g transform="translate(300, 430)">
    <circle cx="0" cy="0" r="80" fill="#27ae60" opacity="0.9"/>
    <circle cx="0" cy="-5" r="18" fill="#fff"/>
    <ellipse cx="0" cy="20" rx="24" ry="14" fill="#fff"/>
    <text x="0" y="55" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">맥락 제공</text>
  </g>

  <!-- 연결선 -->
  <line x1="300" y1="520" x2="300" y2="580" stroke="#2c3e50" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- 원칙 3: 반복 개선 -->
  <g transform="translate(300, 680)">
    <circle cx="0" cy="0" r="80" fill="#f39c12" opacity="0.9"/>
    <path d="M 20,-12 A 25 25 0 1 1 -12,-20" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <polygon points="25,-16 30,-6 20,-10" fill="#fff"/>
    <path d="M -20,12 A 25 25 0 1 1 12,20" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <polygon points="-25,16 -30,6 -20,10" fill="#fff"/>
    <text x="0" y="55" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">반복 개선</text>
  </g>
</svg>
