<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- Before -->
  <text x="300" y="100" text-anchor="middle" font-size="28" font-weight="bold" fill="#e74c3c" font-family="sans-serif">Before</text>

  <!-- 별 1개 -->
  <g transform="translate(300, 200)">
    <polygon points="0,-35 8,-12 35,-12 14,5 22,30 0,15 -22,30 -14,5 -35,-12 -8,-12" fill="#e74c3c" opacity="0.3"/>
  </g>
  <text x="300" y="260" text-anchor="middle" font-size="16" fill="#e74c3c" font-family="sans-serif">일반적인 답변</text>

  <!-- 화살표 -->
  <g transform="translate(300, 340)">
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#3498db" stroke-width="4"/>
    <polygon points="0,35 -10,20 10,20" fill="#3498db"/>
  </g>
  <text x="300" y="420" text-anchor="middle" font-size="16" font-weight="bold" fill="#3498db" font-family="sans-serif">+ 맥락 + 구체적 지시</text>

  <!-- After -->
  <text x="300" y="510" text-anchor="middle" font-size="28" font-weight="bold" fill="#2ecc71" font-family="sans-serif">After</text>

  <!-- 별 3개 -->
  <g transform="translate(240, 600)">
    <polygon points="0,-35 8,-12 35,-12 14,5 22,30 0,15 -22,30 -14,5 -35,-12 -8,-12" fill="#f39c12"/>
  </g>
  <g transform="translate(300, 600)">
    <polygon points="0,-35 8,-12 35,-12 14,5 22,30 0,15 -22,30 -14,5 -35,-12 -8,-12" fill="#f39c12"/>
  </g>
  <g transform="translate(360, 600)">
    <polygon points="0,-35 8,-12 35,-12 14,5 22,30 0,15 -22,30 -14,5 -35,-12 -8,-12" fill="#f39c12"/>
  </g>
  <text x="300" y="660" text-anchor="middle" font-size="16" fill="#2ecc71" font-family="sans-serif">맞춤형 결과물</text>

  <!-- 하단 메시지 -->
  <rect x="140" y="720" width="320" height="50" fill="#fff3cd" stroke="#f39c12" stroke-width="2" rx="10"/>
  <text x="300" y="752" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50" font-family="sans-serif">좋은 프롬프트 = 좋은 결과</text>
</svg>
