<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 프로젝트 폴더 아이콘 (중앙) -->
  <rect x="200" y="120" width="200" height="160" fill="#3498db" rx="15"/>
  <rect x="200" y="100" width="100" height="35" fill="#3498db" rx="8"/>
  <text x="300" y="215" text-anchor="middle" font-size="22" font-weight="bold" fill="#fff" font-family="sans-serif">Project</text>

  <!-- 화살표 -->
  <polygon points="300,310 280,290 320,290" fill="#2c3e50"/>

  <!-- 두 구성요소 -->
  <!-- 작업 공간 -->
  <g transform="translate(170, 400)">
    <rect x="-60" y="-50" width="120" height="100" fill="#e3f2fd" stroke="#3498db" stroke-width="3" rx="12"/>
    <rect x="-35" y="-25" width="70" height="10" fill="#3498db" opacity="0.3" rx="3"/>
    <rect x="-35" y="-8" width="50" height="10" fill="#3498db" opacity="0.3" rx="3"/>
    <rect x="-35" y="9" width="60" height="10" fill="#3498db" opacity="0.3" rx="3"/>
    <text x="0" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50" font-family="sans-serif">작업 공간</text>
  </g>

  <!-- + 기호 -->
  <text x="300" y="410" text-anchor="middle" font-size="40" font-weight="bold" fill="#3498db" font-family="sans-serif">+</text>

  <!-- 지침서 -->
  <g transform="translate(430, 400)">
    <rect x="-60" y="-50" width="120" height="100" fill="#fff3cd" stroke="#f39c12" stroke-width="3" rx="12"/>
    <rect x="-35" y="-25" width="70" height="10" fill="#f39c12" opacity="0.3" rx="3"/>
    <rect x="-35" y="-8" width="50" height="10" fill="#f39c12" opacity="0.3" rx="3"/>
    <rect x="-35" y="9" width="60" height="10" fill="#f39c12" opacity="0.3" rx="3"/>
    <text x="0" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50" font-family="sans-serif">지침서</text>
  </g>

  <!-- 화살표 -->
  <polygon points="300,530 280,510 320,510" fill="#2c3e50"/>

  <!-- 결과 -->
  <rect x="180" y="560" width="240" height="80" fill="#d4edda" stroke="#2ecc71" stroke-width="3" rx="12"/>
  <text x="300" y="605" text-anchor="middle" font-size="18" font-weight="bold" fill="#155724" font-family="sans-serif">맞춤형 결과</text>

  <!-- 하단 메시지 -->
  <text x="300" y="720" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" font-family="sans-serif">역할 + 목적 = 좋은 결과</text>
</svg>
