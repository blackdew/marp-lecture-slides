<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bgGrad_timeline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfe6e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="0" y="-80" width="600" height="960" fill="url(#bgGrad_timeline)" rx="0"/>

  <!-- Vertical timeline line -->
  <line x1="300" y1="180" x2="300" y2="720" stroke="#7f8c8d" stroke-width="4"/>

  <!-- Node 1: 주제 선정 (5분) - 파랑 -->
  <circle cx="300" cy="240" r="60" fill="#3498db" opacity="0.9"/>

  <!-- People icon -->
  <circle cx="285" cy="230" r="12" fill="#ffffff"/>
  <circle cx="285" cy="222" r="5" fill="#2c3e50"/>
  <path d="M 275 235 Q 285 245 295 235" fill="#ffffff"/>

  <circle cx="315" cy="230" r="12" fill="#ffffff"/>
  <circle cx="315" cy="222" r="5" fill="#2c3e50"/>
  <path d="M 305 235 Q 315 245 325 235" fill="#ffffff"/>

  <text x="300" y="265" font-family="sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">주제 선정</text>

  <!-- Time label -->
  <text x="400" y="245" font-family="sans-serif" font-size="20" fill="#3498db" font-weight="bold">5분</text>

  <!-- Node 2: 함께 만들기 (25분) - 초록 (largest) -->
  <circle cx="300" cy="440" r="80" fill="#2ecc71" opacity="0.9"/>

  <!-- Terminal + Person icon -->
  <rect x="270" y="415" width="30" height="22" rx="3" fill="#2c3e50"/>
  <text x="285" y="432" font-family="monospace" font-size="12" fill="#2ecc71" text-anchor="middle">&gt;_</text>

  <circle cx="315" cy="425" r="14" fill="#ffffff"/>
  <circle cx="315" cy="418" r="6" fill="#2c3e50"/>
  <path d="M 305 432 Q 315 442 325 432" fill="#ffffff"/>

  <text x="300" y="470" font-family="sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">함께 만들기</text>

  <!-- Time label (largest) -->
  <text x="420" y="450" font-family="sans-serif" font-size="24" fill="#2ecc71" font-weight="bold">25분</text>

  <!-- Node 3: 결과 리뷰 (5분) - 보라 -->
  <circle cx="300" cy="660" r="60" fill="#9b59b6" opacity="0.9"/>

  <!-- Checklist icon -->
  <rect x="275" y="640" width="50" height="40" rx="4" fill="#ffffff"/>
  <line x1="282" y1="652" x2="288" y2="658" stroke="#2ecc71" stroke-width="3" stroke-linecap="round"/>
  <line x1="288" y1="658" x2="298" y2="648" stroke="#2ecc71" stroke-width="3" stroke-linecap="round"/>
  <line x1="305" y1="652" x2="318" y2="652" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="305" y1="662" x2="318" y2="662" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="305" y1="672" x2="315" y2="672" stroke="#7f8c8d" stroke-width="2"/>

  <text x="300" y="705" font-family="sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">결과 리뷰</text>

  <!-- Time label -->
  <text x="400" y="665" font-family="sans-serif" font-size="20" fill="#9b59b6" font-weight="bold">5분</text>
</svg>