<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 1. 도구 선택 -->
  <g transform="translate(300, 120)">
    <circle cx="0" cy="0" r="60" fill="#3498db"/>
    <rect x="-20" y="-15" width="40" height="30" fill="none" stroke="#fff" stroke-width="3" rx="3"/>
    <rect x="-25" y="15" width="50" height="5" fill="#fff" rx="2"/>
    <text x="0" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" font-family="sans-serif">도구 선택</text>
  </g>

  <!-- 화살표 -->
  <line x1="300" y1="210" x2="300" y2="270" stroke="#2c3e50" stroke-width="3"/>
  <polygon points="300,275 293,260 307,260" fill="#2c3e50"/>

  <!-- 2. 시나리오 -->
  <g transform="translate(300, 340)">
    <circle cx="0" cy="0" r="60" fill="#27ae60"/>
    <rect x="-18" y="-18" width="36" height="42" fill="none" stroke="#fff" stroke-width="3" rx="3"/>
    <line x1="-8" y1="-6" x2="8" y2="-6" stroke="#fff" stroke-width="2"/>
    <line x1="-8" y1="4" x2="8" y2="4" stroke="#fff" stroke-width="2"/>
    <line x1="-8" y1="14" x2="8" y2="14" stroke="#fff" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" font-family="sans-serif">시나리오</text>
  </g>

  <!-- 화살표 -->
  <line x1="300" y1="430" x2="300" y2="490" stroke="#2c3e50" stroke-width="3"/>
  <polygon points="300,495 293,480 307,480" fill="#2c3e50"/>

  <!-- 3. 실행 -->
  <g transform="translate(300, 560)">
    <circle cx="0" cy="0" r="60" fill="#f39c12"/>
    <rect x="-20" y="-12" width="40" height="24" fill="none" stroke="#fff" stroke-width="3" rx="3"/>
    <rect x="-12" y="-4" width="8" height="6" fill="#fff" rx="1"/>
    <rect x="-2" y="-4" width="8" height="6" fill="#fff" rx="1"/>
    <rect x="8" y="-4" width="8" height="6" fill="#fff" rx="1"/>
    <text x="0" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" font-family="sans-serif">실행</text>
  </g>

  <!-- 화살표 -->
  <line x1="300" y1="650" x2="300" y2="710" stroke="#2c3e50" stroke-width="3"/>
  <polygon points="300,715 293,700 307,700" fill="#2c3e50"/>

  <!-- 4. 공유 -->
  <g transform="translate(300, 780)">
    <circle cx="0" cy="0" r="60" fill="#9b59b6"/>
    <circle cx="-12" cy="-6" r="8" fill="#fff"/>
    <circle cx="12" cy="-6" r="8" fill="#fff"/>
    <ellipse cx="0" cy="12" rx="24" ry="10" fill="#fff" opacity="0.5"/>
    <text x="0" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" font-family="sans-serif">공유</text>
  </g>
</svg>
