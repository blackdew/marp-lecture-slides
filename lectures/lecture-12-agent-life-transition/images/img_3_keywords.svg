<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#e8ecf1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 1. 선택 -->
  <g transform="translate(300, 140)">
    <circle cx="0" cy="0" r="80" fill="#3498db" opacity="0.12"/>
    <circle cx="0" cy="0" r="58" fill="#3498db"/>
    <path d="M-18 2 L-6 14 L22 -14" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="100" text-anchor="middle" font-size="34" font-weight="bold" fill="#2c3e50" font-family="sans-serif">선택</text>
  </g>

  <!-- 연결선 -->
  <line x1="300" y1="260" x2="300" y2="300" stroke="#bdc3c8" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- 2. 계획 -->
  <g transform="translate(300, 400)">
    <circle cx="0" cy="0" r="80" fill="#2ecc71" opacity="0.12"/>
    <circle cx="0" cy="0" r="58" fill="#2ecc71"/>
    <rect x="-16" y="-22" width="32" height="40" rx="4" fill="none" stroke="white" stroke-width="4"/>
    <rect x="-8" y="-28" width="16" height="8" rx="3" fill="white"/>
    <line x1="-8" y1="-6" x2="8" y2="-6" stroke="white" stroke-width="3"/>
    <line x1="-8" y1="4" x2="8" y2="4" stroke="white" stroke-width="3"/>
    <line x1="-8" y1="14" x2="4" y2="14" stroke="white" stroke-width="3"/>
    <text x="0" y="100" text-anchor="middle" font-size="34" font-weight="bold" fill="#2c3e50" font-family="sans-serif">계획</text>
  </g>

  <!-- 연결선 -->
  <line x1="300" y1="520" x2="300" y2="560" stroke="#bdc3c8" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- 3. 문서화 -->
  <g transform="translate(300, 660)">
    <circle cx="0" cy="0" r="80" fill="#e74c3c" opacity="0.12"/>
    <circle cx="0" cy="0" r="58" fill="#e74c3c"/>
    <rect x="-16" y="-22" width="26" height="38" rx="3" fill="none" stroke="white" stroke-width="4"/>
    <path d="M10 -22 L10 -10 L22 -10" stroke="white" stroke-width="4" fill="none" stroke-linejoin="round"/>
    <path d="M10 -22 L22 -10 L22 16 L-16 16" stroke="white" stroke-width="4" fill="none" stroke-linejoin="round"/>
    <text x="0" y="100" text-anchor="middle" font-size="34" font-weight="bold" fill="#2c3e50" font-family="sans-serif">문서화</text>
  </g>
</svg>
