<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 동심원 (작은 걸음 → 큰 변화) -->
  <circle cx="300" cy="400" r="260" fill="#27ae60" opacity="0.06"/>
  <circle cx="300" cy="400" r="180" fill="#27ae60" opacity="0.1"/>
  <circle cx="300" cy="400" r="100" fill="#27ae60" opacity="0.15"/>

  <!-- 1. 작게 시작 -->
  <g transform="translate(300, 400)">
    <circle cx="0" cy="0" r="60" fill="#e67e22"/>
    <path d="M -8,-5 L 0,-18 L 8,-5 L 4,5 L -4,5 Z" fill="#fff"/>
    <ellipse cx="5" cy="14" rx="10" ry="14" fill="#fff"/>
    <text x="0" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" font-family="sans-serif">작게 시작</text>
  </g>

  <!-- 2. 기록 -->
  <g transform="translate(170, 220)">
    <circle cx="0" cy="0" r="50" fill="#f39c12"/>
    <rect x="-16" y="-18" width="32" height="38" fill="#fff" rx="3"/>
    <line x1="-8" y1="-8" x2="8" y2="-8" stroke="#f39c12" stroke-width="2"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#f39c12" stroke-width="2"/>
    <line x1="-8" y1="8" x2="8" y2="8" stroke="#f39c12" stroke-width="2"/>
    <text x="0" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50" font-family="sans-serif">기록</text>
  </g>

  <!-- 3. 도전 -->
  <g transform="translate(430, 220)">
    <circle cx="0" cy="0" r="50" fill="#27ae60"/>
    <polygon points="0,-20 5,-6 20,-6 8,4 12,18 0,10 -12,18 -8,4 -20,-6 -5,-6" fill="#fff"/>
    <text x="0" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50" font-family="sans-serif">도전</text>
  </g>

  <!-- 하단 메시지 -->
  <rect x="130" y="700" width="340" height="60" fill="#fff" stroke="#2c3e50" stroke-width="3" rx="12"/>
  <text x="300" y="737" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" font-family="sans-serif">작은 걸음이 큰 변화를</text>
</svg>
