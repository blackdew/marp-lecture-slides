<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>
  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 타이틀 -->
  <text x="300" y="60" font-family="sans-serif" font-size="30" font-weight="bold" fill="#2c3e50" text-anchor="middle">MCP</text>

  <!-- 중앙 AI Agent -->
  <circle cx="300" cy="340" r="75" fill="#3498db" opacity="0.15"/>
  <circle cx="300" cy="340" r="55" fill="#3498db"/>
  <circle cx="284" cy="328" r="7" fill="white"/>
  <circle cx="316" cy="328" r="7" fill="white"/>
  <path d="M 280 355 Q 300 368 320 355" stroke="white" stroke-width="4" fill="none"/>
  <text x="300" y="430" font-family="sans-serif" font-size="26" font-weight="bold" fill="#2c3e50" text-anchor="middle">AI Agent</text>

  <!-- 도구 4개 (큰 아이콘) -->
  <!-- 웹 (왼쪽 위) -->
  <g transform="translate(110, 190)">
    <rect x="-45" y="-35" width="90" height="70" fill="white" stroke="#2ecc71" stroke-width="3" rx="12"/>
    <circle cx="0" cy="-2" r="20" fill="none" stroke="#2ecc71" stroke-width="4"/>
    <text x="0" y="60" font-family="sans-serif" font-size="22" fill="#2c3e50" text-anchor="middle">웹</text>
  </g>
  <line x1="155" y1="210" x2="245" y2="300" stroke="#3498db" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- 파일 (오른쪽 위) -->
  <g transform="translate(490, 190)">
    <rect x="-45" y="-35" width="90" height="70" fill="white" stroke="#f39c12" stroke-width="3" rx="12"/>
    <rect x="-14" y="-18" width="28" height="36" rx="3" fill="#f39c12" opacity="0.4"/>
    <text x="0" y="60" font-family="sans-serif" font-size="22" fill="#2c3e50" text-anchor="middle">파일</text>
  </g>
  <line x1="445" y1="210" x2="355" y2="300" stroke="#3498db" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- 앱 (왼쪽 아래) -->
  <g transform="translate(110, 490)">
    <rect x="-45" y="-35" width="90" height="70" fill="white" stroke="#9b59b6" stroke-width="3" rx="12"/>
    <circle cx="-12" cy="-4" r="8" fill="#9b59b6" opacity="0.6"/>
    <circle cx="12" cy="-4" r="8" fill="#9b59b6" opacity="0.6"/>
    <circle cx="0" cy="12" r="8" fill="#9b59b6" opacity="0.6"/>
    <text x="0" y="60" font-family="sans-serif" font-size="22" fill="#2c3e50" text-anchor="middle">앱</text>
  </g>
  <line x1="155" y1="470" x2="245" y2="380" stroke="#3498db" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- DB (오른쪽 아래) -->
  <g transform="translate(490, 490)">
    <rect x="-45" y="-35" width="90" height="70" fill="white" stroke="#e74c3c" stroke-width="3" rx="12"/>
    <ellipse cx="0" cy="-8" rx="22" ry="10" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <line x1="-22" y1="-8" x2="-22" y2="12" stroke="#e74c3c" stroke-width="3"/>
    <line x1="22" y1="-8" x2="22" y2="12" stroke="#e74c3c" stroke-width="3"/>
    <ellipse cx="0" cy="12" rx="22" ry="10" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <text x="0" y="60" font-family="sans-serif" font-size="22" fill="#2c3e50" text-anchor="middle">DB</text>
  </g>
  <line x1="445" y1="470" x2="355" y2="380" stroke="#3498db" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- 하단 메시지 -->
  <rect x="100" y="640" width="400" height="60" rx="30" fill="#3498db" opacity="0.1"/>
  <text x="300" y="678" font-family="sans-serif" font-size="24" font-weight="bold" fill="#3498db" text-anchor="middle">원클릭 도구 연결</text>
</svg>
