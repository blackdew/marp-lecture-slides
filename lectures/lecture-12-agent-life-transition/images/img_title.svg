<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="titleBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfe6e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#titleBgGrad)" rx="0"/>

  <!-- 터미널 창 -->
  <rect x="80" y="120" width="440" height="320" fill="#1e1e2e" rx="12"/>
  <!-- 터미널 상단 바 -->
  <rect x="80" y="120" width="440" height="36" fill="#2c3e50" rx="12"/>
  <rect x="80" y="144" width="440" height="12" fill="#2c3e50"/>
  <!-- 창 버튼 -->
  <circle cx="104" cy="138" r="6" fill="#e74c3c"/>
  <circle cx="124" cy="138" r="6" fill="#f39c12"/>
  <circle cx="144" cy="138" r="6" fill="#2ecc71"/>
  <!-- 터미널 제목 -->
  <text x="300" y="143" font-family="monospace" font-size="12" fill="#7f8c8d" text-anchor="middle">Terminal</text>

  <!-- 터미널 텍스트 -->
  <text x="100" y="186" font-family="monospace" font-size="14" fill="#2ecc71">$</text>
  <text x="115" y="186" font-family="monospace" font-size="14" fill="#ffffff"> claude</text>
  <text x="100" y="214" font-family="monospace" font-size="12" fill="#3498db">?</text>
  <text x="115" y="214" font-family="monospace" font-size="12" fill="#7f8c8d"> What would you like to do?</text>
  <text x="100" y="242" font-family="monospace" font-size="12" fill="#f39c12">></text>
  <text x="115" y="242" font-family="monospace" font-size="12" fill="#ffffff"> HTML 페이지를 만들어줘</text>
  <text x="100" y="278" font-family="monospace" font-size="12" fill="#2ecc71">✓</text>
  <text x="115" y="278" font-family="monospace" font-size="12" fill="#2ecc71"> Created index.html</text>
  <text x="100" y="302" font-family="monospace" font-size="12" fill="#2ecc71">✓</text>
  <text x="115" y="302" font-family="monospace" font-size="12" fill="#2ecc71"> Created style.css</text>
  <text x="100" y="326" font-family="monospace" font-size="12" fill="#3498db">i</text>
  <text x="115" y="326" font-family="monospace" font-size="12" fill="#7f8c8d"> Done in 5.2s</text>

  <!-- 커서 깜빡임 -->
  <rect x="100" y="350" width="8" height="16" fill="#3498db" opacity="0.8"/>

  <!-- 화살표 아래 방향 -->
  <polygon points="300,480 280,460 320,460" fill="#3498db"/>

  <!-- 3개 결과물 아이콘 -->
  <!-- 파일 아이콘 -->
  <rect x="120" y="520" width="80" height="90" fill="#ffffff" rx="6" stroke="#3498db" stroke-width="2"/>
  <rect x="130" y="548" width="60" height="4" fill="#3498db" opacity="0.4" rx="2"/>
  <rect x="130" y="558" width="50" height="4" fill="#3498db" opacity="0.4" rx="2"/>
  <rect x="130" y="568" width="55" height="4" fill="#3498db" opacity="0.4" rx="2"/>
  <text x="160" y="600" font-family="sans-serif" font-size="10" fill="#3498db" text-anchor="middle">.html</text>
  <text x="160" y="536" font-family="sans-serif" font-size="14" fill="#3498db" text-anchor="middle">📄</text>

  <!-- 코드 아이콘 -->
  <rect x="260" y="520" width="80" height="90" fill="#ffffff" rx="6" stroke="#2ecc71" stroke-width="2"/>
  <text x="300" y="560" font-family="monospace" font-size="16" fill="#2ecc71" text-anchor="middle">&lt;/&gt;</text>
  <text x="300" y="580" font-family="sans-serif" font-size="10" fill="#2ecc71" text-anchor="middle">코드</text>

  <!-- 문서 아이콘 -->
  <rect x="400" y="520" width="80" height="90" fill="#ffffff" rx="6" stroke="#9b59b6" stroke-width="2"/>
  <rect x="410" y="548" width="60" height="4" fill="#9b59b6" opacity="0.4" rx="2"/>
  <rect x="410" y="558" width="50" height="4" fill="#9b59b6" opacity="0.4" rx="2"/>
  <rect x="410" y="568" width="40" height="4" fill="#9b59b6" opacity="0.4" rx="2"/>
  <text x="440" y="536" font-family="sans-serif" font-size="14" fill="#9b59b6" text-anchor="middle">📋</text>
  <text x="440" y="600" font-family="sans-serif" font-size="10" fill="#9b59b6" text-anchor="middle">문서</text>

  <!-- 하단 타이틀 -->
  <text x="300" y="700" font-family="sans-serif" font-size="30" font-weight="bold" fill="#2c3e50" text-anchor="middle">AI Agent 활용</text>
  <text x="300" y="745" font-family="sans-serif" font-size="22" fill="#7f8c8d" text-anchor="middle">생활/업무 전환</text>
</svg>
