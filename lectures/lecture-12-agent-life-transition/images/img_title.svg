<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="titleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#titleBg)"/>

  <!-- Agent 아이콘 (중앙) -->
  <circle cx="300" cy="280" r="100" fill="#3498db" opacity="0.15"/>
  <circle cx="300" cy="260" r="35" fill="#3498db"/>
  <ellipse cx="300" cy="310" rx="45" ry="28" fill="#3498db"/>
  <!-- 도구 표시 -->
  <rect x="340" y="240" width="28" height="34" rx="5" fill="#2ecc71"/>
  <text x="354" y="264" font-family="sans-serif" font-size="20" fill="#fff" text-anchor="middle">F</text>

  <!-- 3 역할 -->
  <g transform="translate(160, 500)">
    <circle cx="0" cy="0" r="35" fill="#3498db" opacity="0.2"/>
    <circle cx="0" cy="-8" r="12" fill="#3498db"/>
    <ellipse cx="0" cy="10" rx="16" ry="10" fill="#3498db"/>
    <text x="0" y="52" font-family="sans-serif" font-size="16" font-weight="bold" fill="#3498db" text-anchor="middle">학생</text>
  </g>

  <g transform="translate(300, 500)">
    <circle cx="0" cy="0" r="35" fill="#2ecc71" opacity="0.2"/>
    <circle cx="0" cy="-8" r="12" fill="#2ecc71"/>
    <ellipse cx="0" cy="10" rx="16" ry="10" fill="#2ecc71"/>
    <text x="0" y="52" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2ecc71" text-anchor="middle">대학원생</text>
  </g>

  <g transform="translate(440, 500)">
    <circle cx="0" cy="0" r="35" fill="#9b59b6" opacity="0.2"/>
    <circle cx="0" cy="-8" r="12" fill="#9b59b6"/>
    <ellipse cx="0" cy="10" rx="16" ry="10" fill="#9b59b6"/>
    <text x="0" y="52" font-family="sans-serif" font-size="16" font-weight="bold" fill="#9b59b6" text-anchor="middle">교직원</text>
  </g>

  <!-- 타이틀 -->
  <text x="300" y="680" font-family="sans-serif" font-size="32" font-weight="bold" fill="#2c3e50" text-anchor="middle">AI Agent 활용</text>
  <text x="300" y="720" font-family="sans-serif" font-size="22" fill="#7f8c8d" text-anchor="middle">생활/업무 전환</text>
</svg>
