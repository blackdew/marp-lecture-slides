<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="960" y="-80" fill="url(#bg2)"/>

  <!-- 상승 화살표 (왼쪽) -->
  <line x1="100" y1="700" x2="100" y2="100" stroke="#f39c12" stroke-width="5" stroke-dasharray="12 8"/>
  <polygon points="100,80 85,115 115,115" fill="#f39c12"/>

  <!-- Layer 1 (하단): 실행의 전환 -->
  <g transform="translate(300, 650)">
    <rect x="-180" y="-55" width="360" height="110" rx="20" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="3"/>
    <!-- 도구 아이콘 -->
    <rect x="-140" y="-25" width="12" height="50" rx="2" fill="#3498db"/>
    <circle cx="-134" cy="-30" r="14" fill="#3498db" opacity="0.6"/>
    <text x="20" y="12" font-family="sans-serif" font-size="36" font-weight="bold" fill="#2c3e50" text-anchor="middle">실행</text>
  </g>

  <!-- Layer 2 (중간): 결정의 전환 -->
  <g transform="translate(300, 420)">
    <rect x="-150" y="-55" width="300" height="110" rx="20" fill="#2ecc71" opacity="0.2" stroke="#2ecc71" stroke-width="3"/>
    <!-- 나침반 아이콘 -->
    <circle cx="-105" cy="0" r="28" fill="none" stroke="#2ecc71" stroke-width="4"/>
    <polygon points="-105,-18 -100,0 -105,18 -110,0" fill="#e74c3c"/>
    <text x="20" y="12" font-family="sans-serif" font-size="36" font-weight="bold" fill="#2c3e50" text-anchor="middle">결정</text>
  </g>

  <!-- Layer 3 (상단): 시간의 전환 -->
  <g transform="translate(300, 190)">
    <rect x="-120" y="-55" width="240" height="110" rx="20" fill="#9b59b6" opacity="0.2" stroke="#9b59b6" stroke-width="3"/>
    <!-- 시계 아이콘 -->
    <circle cx="-75" cy="0" r="28" fill="none" stroke="#9b59b6" stroke-width="4"/>
    <line x1="-75" y1="-18" x2="-75" y2="0" stroke="#9b59b6" stroke-width="4" stroke-linecap="round"/>
    <line x1="-75" y1="0" x2="-60" y2="10" stroke="#9b59b6" stroke-width="4" stroke-linecap="round"/>
    <text x="20" y="12" font-family="sans-serif" font-size="36" font-weight="bold" fill="#2c3e50" text-anchor="middle">시간</text>
  </g>
</svg>
