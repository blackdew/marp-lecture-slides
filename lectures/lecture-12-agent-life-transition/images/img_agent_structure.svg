<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#e8eef5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 중앙 LLM -->
  <circle cx="300" cy="250" r="85" fill="#3498db" opacity="0.12"/>
  <circle cx="300" cy="250" r="65" fill="#3498db"/>
  <text x="300" y="240" text-anchor="middle" font-size="36" font-weight="bold" fill="white" font-family="sans-serif">LLM</text>
  <text x="300" y="275" text-anchor="middle" font-size="22" fill="white" opacity="0.9" font-family="sans-serif">두뇌</text>

  <!-- Memory (왼쪽 위) -->
  <g transform="translate(105, 130)">
    <rect x="-55" y="-30" width="110" height="60" rx="14" fill="#9b59b6"/>
    <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="bold" fill="white" font-family="sans-serif">Memory</text>
  </g>
  <line x1="160" y1="140" x2="240" y2="210" stroke="#9b59b6" stroke-width="3" opacity="0.5"/>

  <!-- Planning (오른쪽 위) -->
  <g transform="translate(495, 130)">
    <rect x="-55" y="-30" width="110" height="60" rx="14" fill="#2ecc71"/>
    <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="bold" fill="white" font-family="sans-serif">Planning</text>
  </g>
  <line x1="440" y1="140" x2="360" y2="210" stroke="#2ecc71" stroke-width="3" opacity="0.5"/>

  <!-- Tools (아래, 강조) -->
  <g transform="translate(300, 420)">
    <rect x="-110" y="-35" width="220" height="70" rx="18" fill="#e74c3c" stroke="#c0392b" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-size="28" font-weight="bold" fill="white" font-family="sans-serif">Tools</text>
    <text x="120" y="5" font-size="28" fill="#ffd700">★</text>
  </g>
  <line x1="300" y1="315" x2="300" y2="385" stroke="#e74c3c" stroke-width="3"/>

  <!-- 도구 아이콘 3개 (심플) -->
  <g transform="translate(140, 560)">
    <rect x="-40" y="-30" width="80" height="60" rx="10" fill="white" stroke="#3498db" stroke-width="2"/>
    <rect x="-14" y="-18" width="28" height="36" rx="3" fill="#3498db" opacity="0.3"/>
    <text x="0" y="55" text-anchor="middle" font-size="22" fill="#2c3e50" font-family="sans-serif">파일</text>
  </g>
  <g transform="translate(300, 560)">
    <rect x="-40" y="-30" width="80" height="60" rx="10" fill="white" stroke="#2ecc71" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-size="26" fill="#2ecc71" font-family="monospace">&lt;/&gt;</text>
    <text x="0" y="55" text-anchor="middle" font-size="22" fill="#2c3e50" font-family="sans-serif">코드</text>
  </g>
  <g transform="translate(460, 560)">
    <rect x="-40" y="-30" width="80" height="60" rx="10" fill="white" stroke="#f39c12" stroke-width="2"/>
    <circle cx="0" cy="-2" r="18" fill="none" stroke="#f39c12" stroke-width="3"/>
    <text x="0" y="55" text-anchor="middle" font-size="22" fill="#2c3e50" font-family="sans-serif">웹</text>
  </g>

  <!-- 연결선 -->
  <line x1="230" y1="490" x2="140" y2="530" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="300" y1="490" x2="300" y2="530" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="370" y1="490" x2="460" y2="530" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="4,4"/>
</svg>
