<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9ef"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="-80" width="600" height="960" fill="url(#bg)"/>

  <!-- 챗봇 섹션 -->
  <g transform="translate(160, 180)">
    <circle cx="0" cy="0" r="80" fill="#f39c12" opacity="0.15"/>
    <!-- 얼굴 -->
    <circle cx="0" cy="-5" r="45" fill="#f39c12"/>
    <circle cx="-14" cy="-15" r="6" fill="white"/>
    <circle cx="14" cy="-15" r="6" fill="white"/>
    <path d="M -12 8 Q 0 18 12 8" stroke="white" stroke-width="3" fill="none"/>
    <!-- 말풍선 -->
    <rect x="40" y="-45" width="80" height="40" rx="10" fill="white" stroke="#f39c12" stroke-width="2"/>
    <text x="80" y="-18" font-family="sans-serif" font-size="22" fill="#f39c12" text-anchor="middle">...</text>
    <text x="0" y="100" font-family="sans-serif" font-size="32" font-weight="bold" fill="#f39c12" text-anchor="middle">챗봇</text>
    <text x="0" y="135" font-family="sans-serif" font-size="24" fill="#7f8c8d" text-anchor="middle">말만</text>
  </g>

  <!-- 화살표 -->
  <text x="300" y="200" text-anchor="middle" font-size="50" fill="#3498db">→</text>

  <!-- Agent 섹션 -->
  <g transform="translate(440, 180)">
    <circle cx="0" cy="0" r="80" fill="#3498db" opacity="0.15"/>
    <!-- 얼굴 -->
    <circle cx="0" cy="-5" r="45" fill="#3498db"/>
    <circle cx="-14" cy="-15" r="6" fill="white"/>
    <circle cx="14" cy="-15" r="6" fill="white"/>
    <path d="M -12 8 Q 0 18 12 8" stroke="white" stroke-width="3" fill="none"/>
    <!-- 도구 표시 -->
    <rect x="32" y="-30" width="22" height="28" rx="4" fill="#2ecc71"/>
    <text x="43" y="-8" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle">F</text>
    <text x="0" y="100" font-family="sans-serif" font-size="32" font-weight="bold" fill="#3498db" text-anchor="middle">Agent</text>
    <text x="0" y="135" font-family="sans-serif" font-size="24" fill="#7f8c8d" text-anchor="middle">말+실행</text>
  </g>

  <!-- 하단 비교 -->
  <g transform="translate(300, 520)">
    <rect x="-200" y="-50" width="170" height="90" rx="14" fill="#fff3cd"/>
    <text x="-115" y="-10" font-family="sans-serif" font-size="24" font-weight="bold" fill="#856404" text-anchor="middle">방법 알려줌</text>
    <text x="-115" y="25" font-family="sans-serif" font-size="22" fill="#856404" text-anchor="middle">→ 직접 해야</text>

    <rect x="30" y="-50" width="170" height="90" rx="14" fill="#d4edda"/>
    <text x="115" y="-10" font-family="sans-serif" font-size="24" font-weight="bold" fill="#155724" text-anchor="middle">직접 실행!</text>
    <text x="115" y="25" font-family="sans-serif" font-size="22" fill="#155724" text-anchor="middle">→ 파일 생성</text>
  </g>

  <!-- 핵심 메시지 -->
  <rect x="100" y="660" width="400" height="60" rx="30" fill="#3498db" opacity="0.1"/>
  <text x="300" y="698" text-anchor="middle" font-size="24" font-weight="bold" fill="#3498db" font-family="sans-serif">도구를 쓰는 AI 동료</text>
</svg>
