<h2 id="%EC%98%A4%EB%8A%98%EC%9D%98-%EC%B6%9C%EB%B0%9C%EC%A0%90-agent%EC%97%90-%EB%8C%80%ED%95%9C-%EB%AF%BF%EC%9D%8C">오늘의 출발점: Agent에 대한 믿음</h2>
<div class="question">
<p>AI Agent는 여러분이 생각하는 것보다 훨씬 많은 일을 할 수 있습니다. 한번 믿어보세요.</p>
</div>
<table>
<thead>
<tr>
<th>상황</th>
<th>기존 방식</th>
<th>Agent 활용</th>
</tr>
</thead>
<tbody>
<tr>
<td>보고서 초안</td>
<td>2시간 검색+작성</td>
<td>5분 프롬프트 → 초안 완성</td>
</tr>
<tr>
<td>데이터 정리</td>
<td>엑셀 수작업</td>
<td>&quot;이 데이터를 정리해줘&quot; 한 줄</td>
</tr>
<tr>
<td>발표자료</td>
<td>PPT 템플릿 찾기</td>
<td>&quot;발표자료 만들어줘&quot; → 완성</td>
</tr>
</tbody>
</table>
<div class="success">
<p>Agent가 잘 못하는 것처럼 느껴질 때, 그건 Agent의 한계가 아닙니다.<br />
<strong>내가 원하는 걸 시키는 법을 아직 찾지 못한 것</strong>입니다.</p>
</div>
</section>

<h2 id="agent%EB%9E%80-%EB%AC%B4%EC%97%87%EC%9D%B8%EA%B0%80">Agent란 무엇인가?</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="5" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_chatbot_vs_agent.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720"><section id="5" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="5" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="%EC%B1%97%EB%B4%87-vs-ai-agent">챗봇 vs AI Agent</h2>
<table>
<thead>
<tr>
<th>구분</th>
<th>챗봇</th>
<th>AI Agent</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>역할</strong></td>
<td>대화 상대</td>
<td>작업 수행자</td>
</tr>
<tr>
<td><strong>도구</strong></td>
<td>없음</td>
<td>파일, 웹, 코드 등</td>
</tr>
<tr>
<td><strong>기억</strong></td>
<td>대화만</td>
<td>프로젝트 지식</td>
</tr>
<tr>
<td><strong>자율성</strong></td>
<td>낮음</td>
<td>높음</td>
</tr>
</tbody>
</table>
<div class="highlight">
<p>Agent = 도구를 쓸 줄 아는 AI 동료</p>
</div>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="5" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="6" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="left"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_agent_structure.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720" x="35%"><section id="6" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="6" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="left">
<h2 id="ai-agent-%EA%B5%AC%EC%A1%B0">AI Agent 구조</h2>
<h3 id="4%EA%B0%80%EC%A7%80-%ED%95%B5%EC%8B%AC-%EC%9A%94%EC%86%8C">4가지 핵심 요소</h3>
<ol>
<li><strong>LLM</strong>: 언어 이해/생성 엔진</li>
<li><strong>Memory</strong>: 대화 이력 + 프로젝트 지식</li>
<li><strong>Planning</strong>: 작업 분해 + 순서 결정</li>
<li><strong>Tools</strong>: 파일 읽기/쓰기, 웹 검색, 코드 실행 등</li>
</ol>
<div class="success">
<p>핵심: 도구를 쓸 수 있기에 &quot;실행&quot;이 가능하다</p>
</div>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="6" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="left"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="7" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_acceleration.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720"><section id="7" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="7" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="agent%EB%A5%BC-%ED%86%B5%ED%95%9C-%EA%B0%80%EC%86%8D%EC%9D%98-%EC%9D%98%EB%AF%B8">Agent를 통한 가속의 의미</h2>
<h3 id="%EB%8B%A8%EC%88%9C%ED%95%9C-%EB%B9%A0%EB%A6%84%EC%9D%B4-%EC%95%84%EB%8B%99%EB%8B%88%EB%8B%A4">단순한 &quot;빠름&quot;이 아닙니다</h3>
<table>
<thead>
<tr>
<th>가속의 차원</th>
<th>의미</th>
<th>예시</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>실행 해방</strong></td>
<td>반복 작업에서 벗어남</td>
<td>회의록 정리, 이메일 초안</td>
</tr>
<tr>
<td><strong>레버리지</strong></td>
<td>작은 노력으로 큰 결과</td>
<td>1시간 기획 → 완성된 보고서</td>
</tr>
<tr>
<td><strong>아이디어 생존율</strong></td>
<td>실행 부담 없이 시도</td>
<td>&quot;해볼까?&quot; → 바로 프로토타입</td>
</tr>
</tbody>
</table>
<div class="highlight">
<p>핵심: 실행력이 아니라 판단력이 경쟁력</p>
</div>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="7" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="8" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EA%B0%95%EC%82%AC%EC%9D%98-%EA%B2%BD%ED%97%98-12%EC%9B%94-agent%EC%99%80-%ED%95%A8%EA%BB%98%ED%95%9C-2%EA%B0%9C%EC%9B%94">강사의 경험: 1~2월, Agent와 함께한 2개월</h2>
<table>
<thead>
<tr>
<th>프로젝트</th>
<th>내용</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>논문 연구 + 사이트 제작</strong></td>
<td>연구와 웹사이트를 동시에</td>
</tr>
<tr>
<td><strong>강의 자료 제작</strong></td>
<td>이 강의를 포함한 여러 강의</td>
</tr>
<tr>
<td><strong>음악 생성 및 배포</strong></td>
<td>8곡 작곡·편곡·배포</td>
</tr>
<tr>
<td><strong>멘토링</strong></td>
<td>5회 진행</td>
</tr>
<tr>
<td><strong>개인+팀 프로젝트 3개</strong></td>
<td>otu.oss, 주식 종목 추천, 남해 일자리+빈집 알리미</td>
</tr>
</tbody>
</table>
<div class="question">
<p>Agent 사용 전과 비교하면 생산성이 약 10배.<br />
반면 스트레스는 오히려 적고, 쉬고 놀고 운동하고 사람 만날 시간이 생겼습니다.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="9" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="agent-%EA%B0%80%EC%86%8D--%EC%82%B6%EC%9D%98-%EB%82%9C%EC%9D%B4%EB%8F%84%EA%B0%80-%EB%B0%94%EB%80%8C%EB%8A%94-%EA%B2%BD%ED%97%98">Agent 가속 = 삶의 난이도가 바뀌는 경험</h2>
<h3 id="%EA%B2%8C%EC%9E%84%EC%97%90-%EB%B9%84%EC%9C%A0%ED%95%98%EB%A9%B4">게임에 비유하면</h3>
<p>가챠에서 <strong>프리미엄 등급 아이템</strong>을 뽑았을 때를 떠올려보세요.<br />
그 전까지 어렵게 느껴지던 스테이지가, 아이템 하나로 <strong>완전히 다른 난이도</strong>가 됩니다.</p>
<table>
<thead>
<tr>
<th>구분</th>
<th>가챠 아이템 획득 전</th>
<th>가챠 아이템 획득 후</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>난이도</strong></td>
<td>어렵고 시간이 오래 걸림</td>
<td>같은 스테이지가 쉬워짐</td>
</tr>
<tr>
<td><strong>전략</strong></td>
<td>생존에 집중</td>
<td>더 높은 목표에 도전</td>
</tr>
<tr>
<td><strong>여유</strong></td>
<td>없음</td>
<td>새로운 플레이 방식 탐색</td>
</tr>
</tbody>
</table>
<h3 id="agent%EA%B0%80-%EB%B0%94%EB%A1%9C-%EA%B7%B8-%EC%95%84%EC%9D%B4%ED%85%9C%EC%9E%85%EB%8B%88%EB%8B%A4">Agent가 바로 그 아이템입니다</h3>
<ul>
<li>Agent 사용 전: 과제, 보고서, 정리... 하나하나가 <strong>높은 난이도</strong></li>
<li>Agent 사용 후: 같은 일이 <strong>쉬워지고</strong>, 더 많은 걸 시도할 여유가 생김</li>
</ul>
<div class="highlight">
<p>Agent는 삶의 난이도를 바꿔주는 프리미엄 아이템. <strong>이미 여러분의 손에 있습니다.</strong></p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="10" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="agent-%EC%8B%9C%EB%8C%80%EC%9D%98-%EA%B0%90%EA%B0%81--%EB%BD%91%EA%B8%B0">Agent 시대의 감각 — 뽑기</h2>
<h3 id="aka-ai-%EC%9E%98-%EB%8B%A4%EB%A3%A8%EB%8A%94-%EB%B2%95">A.K.A. AI 잘 다루는 법</h3>
<p>인형 뽑기를 떠올려보세요. 뽑기는 뽑기인데, <strong>기술이 있는 뽑기</strong>입니다.</p>
<table>
<thead>
<tr>
<th>인형 뽑기</th>
<th>Agent 활용</th>
</tr>
</thead>
<tbody>
<tr>
<td>집게 위치와 타이밍 감각</td>
<td>어떤 프롬프트가 좋은 결과를 내는지 감각</td>
</tr>
<tr>
<td>많이 해본 사람이 잘 뽑음</td>
<td>많이 써본 사람이 잘 시킴</td>
</tr>
<tr>
<td>기계마다 특성이 다름</td>
<td>모델마다 특성이 다름</td>
</tr>
</tbody>
</table>
<h3 id="%EA%B2%BD%ED%97%98%EC%9D%B4-%EC%8C%93%EC%9D%B4%EB%A9%B4">경험이 쌓이면</h3>
<ul>
<li>어떤 <strong>문장의 조합</strong>이 내가 원하는 결과를 만드는지 알게 됩니다</li>
<li>모델에 대한 <strong>경험과 이해</strong>가 깊어질수록 뽑기 성공률이 올라갑니다</li>
</ul>
<div class="success">
<p>좋은 결과를 뽑는 건 운이 아닙니다. <strong>경험과 노하우</strong>입니다.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="11" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="act-1-%ED%95%B5%EC%8B%AC-%EB%A9%94%EC%8B%9C%EC%A7%80">Act 1 핵심 메시지</h2>
<div class="success">
<p>Agent는 여러분을 대체하지 않습니다.<br />
<strong>무엇을 시킬지 결정하는 능력</strong>이 핵심입니다.</p>
</div>
<h3 id="%EA%B8%B0%EC%96%B5%ED%95%A0-%EA%B2%83">기억할 것</h3>
<ul>
<li>Agent = 유능한 조교. 시키면 실행하지만, <strong>방향은 내가 결정</strong></li>
<li>Agent는 삶의 난이도를 바꿔주는 <strong>프리미엄 아이템</strong></li>
<li>&quot;내가 직접 하지 말고, Agent에게 시킬 수 있는 건 무엇인가?&quot;</li>
</ul>
<div class="highlight">
<p>핵심: 시킬지 고민하라. 내가 대신하지 마라.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="12" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="act-2">Act 2</h1>
<h2 id="agent%EC%97%90%EA%B2%8C-%EC%9D%BC-%EB%A7%A1%EA%B8%B0%EB%8A%94-%EB%B2%95">Agent에게 일 맡기는 법</h2>
<p><strong>프롬프트 원칙, 문서화, 그리고 위임의 기술</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="13" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_pair_prompting.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720"><section id="13" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="13" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="%ED%8E%98%EC%96%B4-%ED%94%84%EB%A1%AC%ED%94%84%ED%8C%85%EC%9D%B4%EB%9E%80">페어 프롬프팅이란?</h2>
<h3 id="%ED%95%98%EB%82%98%EC%9D%98-%ED%99%94%EB%A9%B4-%ED%95%A8%EA%BB%98-%EB%B3%B4%EB%8A%94-agent-%EC%9E%91%EC%97%85">하나의 화면, 함께 보는 Agent 작업</h3>
<table>
<thead>
<tr>
<th>구분</th>
<th>페어 프로그래밍</th>
<th>페어 프롬프팅</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>화면</strong></td>
<td>1대의 컴퓨터 공유</td>
<td>1개의 Agent 화면 공유</td>
</tr>
<tr>
<td><strong>참여</strong></td>
<td>2명이 함께 코딩</td>
<td>2명 이상이 함께 지시</td>
</tr>
<tr>
<td><strong>Agent 작업 중</strong></td>
<td>코드 리뷰·토론</td>
<td>서로의 AI 경험을 나누는 시간</td>
</tr>
</tbody>
</table>
<h3 id="%EC%99%9C-%ED%95%A8%EA%BB%98-%ED%95%98%EB%8A%94%EA%B0%80">왜 함께 하는가?</h3>
<ul>
<li><strong>하나의 화면</strong>을 함께 보며 Agent에게 시키고 지켜본다</li>
<li>Agent가 작업하는 동안이 <strong>서로의 AI 활용 경험을 나누는 시간</strong>이다</li>
<li>혼자보다 함께할 때 <strong>더 좋은 질문, 더 다양한 관점</strong>이 나온다</li>
</ul>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="13" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="14" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="left"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_group_prompting.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720" x="35%"><section id="14" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="14" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="left">
<h2 id="%EC%B2%AB-%EB%B2%88%EC%A7%B8-%ED%8E%98%EC%96%B4-%ED%94%84%EB%A1%AC%ED%94%84%ED%8C%85">첫 번째 페어 프롬프팅</h2>
<p><strong>강사 화면을 함께 보며</strong> Agent에게 시키고, 결과를 함께 지켜봅니다.</p>
<table>
<thead>
<tr>
<th>흐름</th>
<th>하는 일</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>함께 시키기</strong></td>
<td>&quot;Agent에게 이걸 시켜보면 어때요?&quot;</td>
</tr>
<tr>
<td><strong>함께 지켜보기</strong></td>
<td>강사 화면으로 Agent 작업 과정을 관찰</td>
</tr>
<tr>
<td><strong>경험 나누기</strong></td>
<td>Agent가 작업하는 동안 서로의 AI 경험 공유</td>
</tr>
</tbody>
</table>
<div class="question">
<p>하나의 화면을 함께 보겠습니다. Agent에게 뭘 시켜볼까요?</p>
</div>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="14" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="left"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="15" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EC%BB%A8%ED%85%8D%EC%8A%A4%ED%8A%B8-agent%EC%97%90%EA%B2%8C-%EB%A7%A5%EB%9D%BD-%EC%A0%84%EB%8B%AC%ED%95%98%EA%B8%B0">컨텍스트: Agent에게 맥락 전달하기</h2>
<table>
<thead>
<tr>
<th>항목</th>
<th>컨텍스트 비어있을 때</th>
<th>컨텍스트 채웠을 때</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>대상</strong></td>
<td>&quot;일반 대중용&quot; (추측)</td>
<td>&quot;교수님 제출용&quot; (명시)</td>
</tr>
<tr>
<td><strong>톤</strong></td>
<td>&quot;중립적&quot; (추측)</td>
<td>&quot;학술적, 객관적&quot; (명시)</td>
</tr>
<tr>
<td><strong>분량</strong></td>
<td>&quot;적당히&quot; (추측)</td>
<td>&quot;A4 5장&quot; (명시)</td>
</tr>
<tr>
<td><strong>결과</strong></td>
<td>예측 불가능</td>
<td>원하는 결과물</td>
</tr>
</tbody>
</table>
<div class="highlight">
<p><strong>핵심</strong>: 빈 컨텍스트 = Agent가 추측 = 엉뚱한 결과. 맥락을 채울수록 결과가 좋아집니다.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="16" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="left"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_prompt_comparison.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720" x="35%"><section id="16" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="16" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="left">
<h2 id="%EC%A2%8B%EC%9D%80-%ED%94%84%EB%A1%AC%ED%94%84%ED%8A%B8-vs-%EB%82%98%EC%81%9C-%ED%94%84%EB%A1%AC%ED%94%84%ED%8A%B8">좋은 프롬프트 vs 나쁜 프롬프트</h2>
<table>
<thead>
<tr>
<th>구분</th>
<th>나쁜 프롬프트</th>
<th>좋은 프롬프트</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>내용</strong></td>
<td>&quot;레포트 써줘&quot;</td>
<td>&quot;소프트웨어공학 중간 리포트, 애자일 방법론&quot;</td>
</tr>
<tr>
<td><strong>구조</strong></td>
<td>(없음)</td>
<td>&quot;서론-본론(3장)-결론&quot;</td>
</tr>
<tr>
<td><strong>분량</strong></td>
<td>(없음)</td>
<td>&quot;A4 5장, APA 형식&quot;</td>
</tr>
<tr>
<td><strong>결과</strong></td>
<td>Agent가 추측 → 엉뚱한 결과</td>
<td>구체적 지시 → 원하는 결과</td>
</tr>
</tbody>
</table>
<h3 id="%EC%A2%8B%EC%9D%80-%ED%94%84%EB%A1%AC%ED%94%84%ED%8A%B8-3%EC%9B%90%EC%B9%99">좋은 프롬프트 3원칙</h3>
<table>
<thead>
<tr>
<th>원칙</th>
<th>설명</th>
<th>예시</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>구체성</strong></td>
<td>무엇을 원하는지 명확히</td>
<td>&quot;A4 5장, APA 형식&quot;</td>
</tr>
<tr>
<td><strong>단계성</strong></td>
<td>순서를 정해주기</td>
<td>&quot;서론 → 본론 → 결론&quot;</td>
</tr>
<tr>
<td><strong>결과물 명시</strong></td>
<td>최종 형태를 알려주기</td>
<td>&quot;PDF로 저장, 표 포함&quot;</td>
</tr>
</tbody>
</table>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="16" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="left"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="17" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EC%97%AD%ED%95%A0%EB%B3%84-%ED%94%84%EB%A1%AC%ED%94%84%ED%8A%B8-%EC%98%88%EC%8B%9C">역할별 프롬프트 예시</h2>
<table>
<thead>
<tr>
<th>역할</th>
<th>상황</th>
<th>좋은 프롬프트 예시</th>
<th>효과</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>학부생</strong></td>
<td>과제 작성</td>
<td>&quot;애자일 방법론 리포트, A4 5장, 학술적 톤&quot;</td>
<td>구체적 지시 → 퀄리티 상승</td>
</tr>
<tr>
<td><strong>대학원생</strong></td>
<td>논문 검색</td>
<td>&quot;딥러닝, 이미지 분류, 2023년 이후, 의료 영상&quot;</td>
<td>명확한 키워드 → 관련도 높은 결과</td>
</tr>
<tr>
<td><strong>교직원</strong></td>
<td>문서 작성</td>
<td>&quot;회의록: 참석자, 안건, 결정사항, 할 일 목록&quot;</td>
<td>상세 명시 → 수정 횟수 감소</td>
</tr>
</tbody>
</table>
<div class="highlight">
<p>핵심: 구체적으로, 맥락과 함께, 그리고 반복 개선</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="18" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="left"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_claudemd_beforeafter.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720" x="35%"><section id="18" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="18" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="left">
<h2 id="claudemd--project-instructions%EB%9E%80">CLAUDE.md / Project Instructions란?</h2>
<p><strong>Before (지침 없음)</strong>:</p>
<ul>
<li>&quot;회의록 정리해줘&quot; → &quot;어떤 형식으로 작성할까요?&quot;</li>
<li>매번 같은 설명을 3-4회 반복</li>
</ul>
<p><strong>After (지침 있음)</strong>:</p>
<ul>
<li>&quot;이번 주 회의록 정리해줘&quot; → 즉시 표 형식+액션아이템 포함 생성</li>
<li>1회 프롬프트로 완료</li>
</ul>
<div class="success">
<p>Project Instructions = Agent에게 주는 프로젝트 설명서<br />
(Claude Desktop의 Projects 기능에서 설정 가능)</p>
</div>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="18" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="left"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="19" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EB%AC%B8%EC%84%9C%ED%99%94-ai%EA%B0%80-%EB%B0%94%EA%BE%BC-%EA%B8%B0%EB%A1%9D%EC%9D%98-%EA%B2%BD%EC%A0%9C%ED%95%99">문서화: AI가 바꾼 기록의 경제학</h2>
<table>
<thead>
<tr>
<th>항목</th>
<th>Before AI</th>
<th>After AI</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>문서화</strong></td>
<td>&quot;나중에&quot; (시간 없음)</td>
<td><strong>&quot;먼저&quot;</strong> (AI가 초안 작성)</td>
</tr>
<tr>
<td><strong>회의록</strong></td>
<td>&quot;누가 쓸래?&quot; (귀찮음)</td>
<td><strong>자동 생성</strong> (검토만 하면 됨)</td>
</tr>
<tr>
<td><strong>정리</strong></td>
<td>&quot;기억나면 하자&quot; (잊어버림)</td>
<td><strong>실시간</strong> (AI가 바로 정리)</td>
</tr>
</tbody>
</table>
<p><strong>비용이 높았기에</strong> 미뤘지만, 이제 <strong>비용이 거의 0</strong>이 되었습니다</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="20" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_skill_automation.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720"><section id="20" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="20" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="%EC%8A%A4%ED%82%ACskills%EC%9D%B4%EB%9E%80">스킬(Skills)이란?</h2>
<p><strong>스킬 = 반복 작업을 한 번에 실행하는 자동화 명령어</strong></p>
<p>예시: &quot;주간 보고서 만들어줘&quot; 한 마디<br />
→ Agent가 자료 수집 → 초안 작성 → 포맷 정리<br />
→ 완성된 보고서 전달</p>
<div class="highlight">
<p>사람은 시작 버튼만 누르면 됨</p>
</div>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="20" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="21" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EB%91%90-%EB%B2%88%EC%A7%B8-%ED%8E%98%EC%96%B4-%ED%94%84%EB%A1%AC%ED%94%84%ED%8C%85">두 번째 페어 프롬프팅</h2>
<p><strong>이번에는</strong> Agent에게 Project Instructions를 만들게 시켜봅니다.</p>
<p><strong>함께 화면을 보며</strong> Agent에게 시키고, 작업 과정을 지켜봅니다.</p>
<table>
<thead>
<tr>
<th>흐름</th>
<th>하는 일</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>함께 시키기</strong></td>
<td>&quot;우리 팀 프로젝트 규칙을 정리해줘&quot;</td>
</tr>
<tr>
<td><strong>함께 지켜보기</strong></td>
<td>Agent가 문서를 만드는 과정을 관찰</td>
</tr>
<tr>
<td><strong>경험 나누기</strong></td>
<td>&quot;나는 이런 식으로 Agent를 써봤는데...&quot;</td>
</tr>
</tbody>
</table>
<div class="question">
<p>Agent가 작업하는 동안, 여러분의 AI 경험을 나눠주세요!</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="22" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="act-2-%ED%95%B5%EC%8B%AC-%EB%A9%94%EC%8B%9C%EC%A7%80">Act 2 핵심 메시지</h2>
<div class="success">
<p><strong>맥락을 전달하라.</strong><br />
구체적으로, 맥락과 함께, 그리고 반복 개선하라.</p>
</div>
<h3 id="%EC%98%A4%EB%8A%98-%EB%B0%B0%EC%9A%B4-%EC%9C%84%EC%9E%84%EC%9D%98-3%EA%B0%80%EC%A7%80-%EB%8F%84%EA%B5%AC">오늘 배운 위임의 3가지 도구</h3>
<table>
<thead>
<tr>
<th>도구</th>
<th>역할</th>
<th>효과</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>프롬프트 원칙</strong></td>
<td>구체적 지시</td>
<td>한 번에 좋은 결과</td>
</tr>
<tr>
<td><strong>CLAUDE.md / Project Instructions</strong></td>
<td>프로젝트 맥락</td>
<td>반복 설명 불필요</td>
</tr>
<tr>
<td><strong>스킬(Skills)</strong></td>
<td>반복 작업 자동화</td>
<td>사람은 시작만</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="23" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%ED%9C%B4%EC%8B%9D">휴식</h1>
<p><strong>10분</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="24" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="act-3">Act 3</h1>
<h2 id="%ED%95%A8%EA%BB%98-%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8-%ED%95%B4%EB%B3%B4%EA%B8%B0">함께 프로젝트 해보기</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="25" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EC%8B%A4%EC%8A%B5-%EC%95%88%EB%82%B4-%EC%97%AD%ED%95%A0%EB%B3%84-%EC%8B%9C%EB%82%98%EB%A6%AC%EC%98%A4">실습 안내: 역할별 시나리오</h2>
<div class="question">
여러분의 역할에 맞는 실습을 선택하세요
</div>
<h3 id="3%EA%B0%9C-%ED%8A%B8%EB%9E%99-%EC%A4%91-%ED%95%98%EB%82%98%EB%A5%BC-%EC%84%A0%ED%83%9D-%EA%B0%81-10%EB%B6%84">3개 트랙 중 하나를 선택 (각 10분)</h3>
<table>
<thead>
<tr>
<th>트랙</th>
<th>대상</th>
<th>주제</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>A: 학업 도우미</strong></td>
<td>학부생</td>
<td>과제 리서치 &amp; 정리 자동화</td>
</tr>
<tr>
<td><strong>B: 논문 탐색</strong></td>
<td>대학원생</td>
<td>논문 검색 &amp; 요약 도구 활용</td>
</tr>
<tr>
<td><strong>C: 문서 자동 작성</strong></td>
<td>교직원</td>
<td>업무 문서 자동 생성 체험</td>
</tr>
</tbody>
</table>
<h3 id="%EC%8B%A4%EC%8A%B5-%EB%AA%A9%ED%91%9C">실습 목표</h3>
<blockquote>
<p>Agent에게 지시하고, 결과를 검토하고, 수정 요청까지 해보기<br />
(트랙별 구체적 성공 기준은 각 슬라이드에 있습니다)</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="26" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%ED%8A%B8%EB%9E%99-a-%ED%95%99%EC%97%85-%EB%8F%84%EC%9A%B0%EB%AF%B8-%ED%95%99%EB%B6%80%EC%83%9D">트랙 A: 학업 도우미 (학부생)</h2>
<h3 id="%EA%B3%BC%EC%A0%9C-%EB%A6%AC%EC%84%9C%EC%B9%98--%EC%A0%95%EB%A6%AC-%EC%9E%90%EB%8F%99%ED%99%94">과제 리서치 &amp; 정리 자동화</h3>
<p><strong>시나리오</strong>:</p>
<ul>
<li>수업 리포트 작성의 시작점 잡기</li>
<li>검색하면 정보가 너무 많아서 정리가 안 됨</li>
</ul>
<p><strong>프롬프트 예시</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>소프트웨어공학 수업 리포트를 써야 해.
주제는 '애자일 방법론의 장단점'.
리포트 개요와 핵심 키워드를 정리해줘.
</code></pre>
<p><strong>도전 과제</strong>: 개요를 바탕으로 서론 초안 작성 요청</p>
<p><strong>성공 기준</strong>: 개요 초안 3개 섹션 이상이 나왔으면 성공</p>
<table>
<thead>
<tr>
<th>키워드</th>
<th>적용</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>선택</strong></td>
<td>Agent가 준 개요 중 어떤 구조를 쓸지는 내가 결정</td>
</tr>
<tr>
<td><strong>계획</strong></td>
<td>구체적 프롬프트(과목, 주제, 형식) = 좋은 결과물</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="27" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%ED%8A%B8%EB%9E%99-b-%EB%85%BC%EB%AC%B8-%ED%83%90%EC%83%89-%EB%8C%80%ED%95%99%EC%9B%90%EC%83%9D">트랙 B: 논문 탐색 (대학원생)</h2>
<h3 id="%EB%85%BC%EB%AC%B8-%EA%B2%80%EC%83%89--%EC%9A%94%EC%95%BD-%EB%8F%84%EA%B5%AC-%ED%99%9C%EC%9A%A9">논문 검색 &amp; 요약 도구 활용</h3>
<p><strong>시나리오</strong>:</p>
<ul>
<li>관련 논문을 빠르게 찾고 싶음</li>
<li>핵심만 요약해서 보고 싶음</li>
</ul>
<p><strong>추천 도구</strong> (모두 무료):</p>
<table>
<thead>
<tr>
<th>도구</th>
<th>기능</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>SciSpace</strong></td>
<td>2억 8천만 건 논문 검색, 요약·해석</td>
</tr>
<tr>
<td><strong>Connected Papers</strong></td>
<td>논문 간 관계 그래프 시각화</td>
</tr>
<tr>
<td><strong>Consensus</strong></td>
<td>문헌 리뷰 초안 자동 작성</td>
</tr>
</tbody>
</table>
<p><strong>실습</strong>: SciSpace에서 연구 주제 검색 → 논문 5편 선택 → AI 요약 확인</p>
<p><strong>성공 기준</strong>: 논문 5편 중 2편 이상의 요약 내용을 설명할 수 있으면 성공</p>
<div class="success">
<strong>효과</strong>: Deep Research 기능 활용 시 리서치 시간 80% 단축
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="28" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%ED%8A%B8%EB%9E%99-c-%EB%AC%B8%EC%84%9C-%EC%9E%90%EB%8F%99-%EC%9E%91%EC%84%B1-%EA%B5%90%EC%A7%81%EC%9B%90">트랙 C: 문서 자동 작성 (교직원)</h2>
<h3 id="%EC%97%85%EB%AC%B4-%EB%AC%B8%EC%84%9C-%EC%9E%90%EB%8F%99-%EC%83%9D%EC%84%B1-%EC%B2%B4%ED%97%98">업무 문서 자동 생성 체험</h3>
<p><strong>시나리오</strong>:</p>
<ul>
<li>반복되는 업무 문서 작성이 부담</li>
<li>자동으로 초안이 만들어지면 좋겠음</li>
</ul>
<p><strong>프롬프트 예시</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>다음 내용으로 행사 기획안 초안을 작성해줘.

행사명: 2026 AI 활용 워크숍
대상: 교직원 30명
일시: 3월 둘째 주
예산: 200만원

형식: 목적, 일정, 예산 배분, 준비물 포함
</code></pre>
<p><strong>결과물</strong>: 행사 기획안 초안</p>
<p><strong>성공 기준</strong>: 초안이 즉시 수정 없이 참고 가능한 수준이면 성공</p>
<div class="highlight">
핵심: 과거 문서를 참조 자료로 제공하면 품질이 더 올라갑니다
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="29" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="ai%EC%99%80-%ED%95%A8%EA%BB%98-%EB%A7%8C%EB%93%A4%EA%B8%B0-%EC%BD%94%EB%94%A9-%EC%97%86%EC%9D%B4-%EB%8F%84%EA%B5%AC-%EC%A0%9C%EC%9E%91">AI와 함께 만들기: 코딩 없이 도구 제작</h2>
<div class="question">
여러분은 "무엇을 만들지"만 결정하세요. 코드는 AI가 작성합니다.
</div>
<h3 id="3%EA%B0%9C-%EC%A4%91-%ED%95%98%EB%82%98%EB%A5%BC-%EC%84%A0%ED%83%9D%ED%95%98%EC%84%B8%EC%9A%94">3개 중 하나를 선택하세요</h3>
<table>
<thead>
<tr>
<th>난이도</th>
<th>프로젝트</th>
<th>설명</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>쉬움</strong></td>
<td>시간표/일정 관리 페이지</td>
<td>요일별 시간표</td>
</tr>
<tr>
<td><strong>보통</strong></td>
<td>할일 목록 앱</td>
<td>추가/삭제/완료 체크</td>
</tr>
<tr>
<td><strong>도전</strong></td>
<td>팀프로젝트 투표 페이지</td>
<td>주제 제안 + 투표</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="30" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="ai%EC%99%80-%ED%95%A8%EA%BB%98-%EB%A7%8C%EB%93%A4%EA%B8%B0-%ED%94%84%EB%A1%AC%ED%94%84%ED%8A%B8%EB%A7%8C-%EC%9E%85%EB%A0%A5%ED%95%98%EC%84%B8%EC%9A%94">AI와 함께 만들기: 프롬프트만 입력하세요</h2>
<p><strong>여러분이 하는 것</strong>: 자연어로 원하는 것을 설명<br />
<strong>AI가 하는 것</strong>: 코드 생성 + 완성된 페이지 제공</p>
<table>
<thead>
<tr>
<th>프로젝트</th>
<th>프롬프트 예시</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>시간표</strong></td>
<td>&quot;월~금 시간표를 보여주는 예쁜 페이지를 만들어줘. 시간대별로 과목명과 장소를 표시해줘.&quot;</td>
</tr>
<tr>
<td><strong>할일 목록</strong></td>
<td>&quot;할일을 추가하고 완료 체크할 수 있는 앱을 만들어줘. 추가, 완료 표시, 삭제 기능.&quot;</td>
</tr>
<tr>
<td><strong>투표 페이지</strong></td>
<td>&quot;팀프로젝트 주제를 제안하고 투표할 수 있는 페이지. 주제 추가, 투표(+1), 순위 정렬.&quot;</td>
</tr>
</tbody>
</table>
<div class="highlight">
핵심: 코딩 지식이 필요한 게 아닙니다. <strong>무엇을 원하는지 구체적으로 설명하는 능력</strong>이 필요합니다.
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="31" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="agent-%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8-%EC%8B%A4%EC%A0%84-%EC%82%AC%EB%A1%80">Agent 프로젝트 실전 사례</h2>
<table>
<thead>
<tr>
<th>대상</th>
<th>활용 사례</th>
<th>도구/방법</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>학부생</strong></td>
<td>논문 리뷰 도우미</td>
<td>PDF 업로드 → 요약 + 핵심 정리</td>
</tr>
<tr>
<td></td>
<td>학습 노트 자동 정리</td>
<td>수업 필기 → 구조화된 노트</td>
</tr>
<tr>
<td></td>

<tr>

<tr>
<td></td>

<tr>
<td></td>

<tr>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="32" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EA%B2%B0%EA%B3%BC-%EB%A6%AC%EB%B7%B0--%ED%95%99%EC%8A%B5-%ED%8F%AC%EC%9D%B8%ED%8A%B8">결과 리뷰 &amp; 학습 포인트</h2>
<p><strong>Agent와의 협업을 돌아봅니다</strong>:</p>
<div class="question">
<p>Agent가 예상보다 잘한 부분은? 놓친 부분은?</p>
</div>
<h3 id="%EC%98%A4%EB%8A%98-%EC%8B%A4%EC%8A%B5%EC%97%90%EC%84%9C-%ED%99%95%EC%9D%B8%ED%95%9C-%EA%B2%83">오늘 실습에서 확인한 것</h3>
<table>
<thead>
<tr>
<th>키워드</th>
<th>실습에서의 적용</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>선택</strong></td>
<td>Agent 결과물 중 무엇을 쓸지는 내가 결정</td>
</tr>
<tr>
<td><strong>계획</strong></td>
<td>구체적 프롬프트 = 좋은 결과 (빈 컨텍스트 = 엉뚱한 결과)</td>
</tr>
<tr>
<td><strong>문서화</strong></td>
<td>프롬프트와 결과물을 기록하면 재활용 가능</td>
</tr>
</tbody>
</table>
<div class="highlight">
주의: Agent가 만든 내용을 그대로 제출하면 표절. <strong>AI 결과물 + 나의 분석/의견 = 진짜 결과물</strong>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="33" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="act-4">Act 4</h1>
<h2 id="%EC%82%B6%EC%9D%98-%EC%A0%84%ED%99%98-%EC%98%A4%EB%8A%98%EB%B6%80%ED%84%B0">삶의 전환, 오늘부터</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="34" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EB%8F%8C%EC%95%84%EB%B3%B4%EA%B8%B0">돌아보기</h2>
<p><strong>오늘 우리가 경험한 4가지 순간</strong>:</p>
<table>
<thead>
<tr>
<th>순간</th>
<th>경험한 것</th>
<th>메시지</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Act 1</strong></td>
<td>Agent 개념 + 가속 체감</td>
<td>시킬지 고민하라</td>
</tr>
<tr>
<td><strong>Act 2</strong></td>
<td>프롬프트 원칙 + 문서화</td>
<td>맥락을 전달하라</td>
</tr>
<tr>
<td><strong>Act 3</strong></td>
<td>역할별 실습 + AI와 함께 만들기</td>
<td>직접 경험이 최고의 학습</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="35" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/img_life_transition.svg&quot;);"></figure></div></section></foreignObject><foreignObject width="65%" height="720"><section id="35" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="35" style="--paginate:true;--theme:default;--marpit-advanced-background-split:35%;" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="ai-%EC%8B%9C%EB%8C%80-%EC%82%B6%EC%9D%98-%EC%A0%84%ED%99%98-3%EC%B8%B5%EC%9C%84">AI 시대 삶의 전환 3층위</h2>
<h3 id="1%EC%B8%B5-%EC%8B%A4%ED%96%89%EC%9D%98-%EC%A0%84%ED%99%98">1층: 실행의 전환</h3>
<ul>
<li>반복 업무를 Agent에게 위임</li>
<li>문서 작성, 데이터 정리, 코드 디버깅</li>
</ul>
<h3 id="2%EC%B8%B5-%EA%B2%B0%EC%A0%95%EC%9D%98-%EC%A0%84%ED%99%98">2층: 결정의 전환</h3>
<ul>
<li>&quot;어떻게&quot;보다 &quot;무엇을&quot; &quot;왜&quot;에 집중</li>
<li>방향 설정과 우선순위가 핵심 역량</li>
</ul>
<h3 id="3%EC%B8%B5-%EC%8B%9C%EA%B0%84%EC%9D%98-%EC%A0%84%ED%99%98">3층: 시간의 전환</h3>
<ul>
<li>확보된 시간을 관계, 경험, 성장에 투자</li>
</ul>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="35" style="" data-marpit-pagination-total="44" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="36" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EC%82%AC%EB%9E%8C%EC%9D%B4-%EC%A7%91%EC%A4%91%ED%95%B4%EC%95%BC-%ED%95%A0-3%EA%B0%80%EC%A7%80">사람이 집중해야 할 3가지</h2>
<table>
<thead>
<tr>
<th>영역</th>
<th>핵심 질문</th>
<th>의미</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>방향 (Direction)</strong></td>
<td>어디로 갈 것인가</td>
<td>결정은 사람의 몫</td>
</tr>
<tr>
<td><strong>관계 (Relationship)</strong></td>
<td>누구와 함께할 것인가</td>
<td>인간 고유의 영역</td>
</tr>
<tr>
<td><strong>현재 경험 (Experience)</strong></td>
<td>지금 이 순간의 경험</td>
<td>삶의 본질</td>
</tr>
</tbody>
</table>
<div class="success">
<p>AI가 실행을 대신해도, <strong>방향·관계·경험</strong>은 사람만이 채울 수 있습니다.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="37" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="agent%EC%9D%98-%ED%95%9C%EA%B3%84%EC%99%80-%EA%B0%80%EB%8A%A5%EC%84%B1">Agent의 한계와 가능성</h2>
<table>
<thead>
<tr>
<th>Agent가 잘하는 것</th>
<th>Agent가 못하는 것</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>파일 조작</strong> - 생성, 수정, 정리, 변환</td>
<td><strong>실시간 검색</strong> - 최신 정보 직접 검색 불가</td>
</tr>
<tr>
<td><strong>코드 생성</strong> - HTML, Python, 스크립트</td>
<td><strong>보안 시스템 접근</strong> - 학교 포털, 은행 등</td>
</tr>
<tr>
<td><strong>문서 요약</strong> - 긴 텍스트를 핵심만 정리</td>
<td><strong>대신 선택하기</strong> - 판단과 결정은 사람의 몫</td>
</tr>
<tr>
<td><strong>구조화</strong> - 막연한 아이디어를 체계적으로</td>
<td><strong>감정/공감</strong> - 진짜 감정을 느끼지 못함</td>
</tr>
<tr>
<td><strong>반복 작업</strong> - 같은 패턴 빠르게 처리</td>
<td><strong>사실 보장</strong> - 틀린 정보를 자신있게 말할 수 있음</td>
</tr>
<tr>
<td><strong>초안 작성</strong> - 리포트, 메일, 기획서</td>
<td><strong>창의적 도약</strong> - 전혀 새로운 발상은 어려움</td>
</tr>
</tbody>
</table>
<div class="highlight">
기대치를 조정해야 실망이 없습니다. Agent는 만능이 아니라 "유능한 조교"입니다.
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="38" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="ai-%EC%8B%9C%EB%8C%80-%EA%B2%BD%EC%9F%81%EB%A0%A5%EC%9D%84-%EC%9C%84%ED%95%9C-3%EA%B0%80%EC%A7%80-%EC%A1%B0%EC%96%B8">AI 시대 경쟁력을 위한 3가지 조언</h2>
<div class="success">
AI가 바꾸는 건 도구이지, 사람의 가치가 아닙니다
</div>
<h3 id="1-%EB%8F%84%EA%B5%AC%EB%A5%BC-%EB%91%90%EB%A0%A4%EC%9B%8C%ED%95%98%EC%A7%80-%EB%A7%88%EC%84%B8%EC%9A%94">1. &quot;도구를 두려워하지 마세요&quot;</h3>
<ul>
<li>학부생: AI Agent는 학업의 협업 파트너</li>
<li>대학원생: AI Agent는 연구의 가속기</li>
<li>교직원: AI Agent는 업무의 효율화 도구</li>
</ul>
<p><strong>핵심</strong>: 도구를 잘 쓰는 사람이 경쟁력을 가집니다</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="39" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="ai-%EC%8B%9C%EB%8C%80-%EA%B2%BD%EC%9F%81%EB%A0%A5%EC%9D%84-%EC%9C%84%ED%95%9C-3%EA%B0%80%EC%A7%80-%EC%A1%B0%EC%96%B8-%EA%B3%84%EC%86%8D">AI 시대 경쟁력을 위한 3가지 조언 (계속)</h2>
<h3 id="2-%EC%84%A0%ED%83%9D%ED%95%98%EB%8A%94-%EB%8A%A5%EB%A0%A5%EC%9D%84-%ED%82%A4%EC%9A%B0%EC%84%B8%EC%9A%94">2. &quot;선택하는 능력을 키우세요&quot;</h3>
<ul>
<li>AI가 10개의 옵션을 만들어도, <strong>고르는 건 사람</strong></li>
<li>&quot;왜 이걸 선택했는가&quot;를 설명할 수 있어야 합니다</li>
</ul>
<h3 id="3-%EA%B8%B0%EB%A1%9D%ED%95%98%EB%8A%94-%EC%8A%B5%EA%B4%80%EC%9D%84-%EB%93%A4%EC%9D%B4%EC%84%B8%EC%9A%94">3. &quot;기록하는 습관을 들이세요&quot;</h3>
<ul>
<li>AI가 문서화 비용을 0에 가깝게 만들었습니다</li>
<li>학부생: 학습 일지, 프로젝트 회고</li>
<li>대학원생: 실험 노트, 연구 일지</li>
<li>교직원: 회의록, 업무 로그</li>
</ul>
<p><strong>핵심</strong>: 기록하는 사람이 성장하는 사람입니다</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="40" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EC%98%A4%EB%8A%98%EB%B6%80%ED%84%B0-%EC%8B%9C%EC%9E%91%ED%95%98%EB%8A%94-3%EA%B0%80%EC%A7%80">오늘부터 시작하는 3가지</h2>
<p><strong>1. 작게 시작하기</strong>:</p>
<ul>
<li>학생: 다음 과제에 Claude로 초안 작성</li>
<li>대학원생: 논문 1편 요약을 Agent에게</li>
<li>교직원: 회의록 템플릿을 Agent로</li>
</ul>
<p><strong>2. 기록하는 습관</strong>:</p>
<ul>
<li>프로젝트마다 간단한 README.md 작성</li>
<li>반복 작업 발견 시 메모</li>
</ul>
<p><strong>3. 경험 공유하기</strong>:</p>
<ul>
<li>팀원/동료에게 오늘 배운 것 공유</li>
</ul>
<div class="success">
<p>오늘 하나만: 내일 할 반복 업무 하나를 Agent에게 맡겨보기</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="41" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="%EC%8B%AC%ED%99%94-%ED%95%99%EC%8A%B5-%EB%A1%9C%EB%93%9C%EB%A7%B5">심화 학습 로드맵</h2>
<h3 id="%EB%8B%A8%EA%B3%84%EB%B3%84-%EC%84%B1%EC%9E%A5-%EA%B2%BD%EB%A1%9C">단계별 성장 경로</h3>
<table>
<thead>
<tr>
<th>시기</th>
<th>목표</th>
<th>실천 방법</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>이번 주</strong></td>
<td>첫 적용</td>
<td>과제/연구/업무 하나에 Agent 써보기</td>
</tr>
<tr>
<td><strong>1개월</strong></td>
<td>습관화</td>
<td>프롬프트 패턴 학습, 문서화 시작</td>
</tr>
<tr>
<td><strong>3개월</strong></td>
<td>심화 활용</td>
<td>개인 프로젝트에 적용, 도구 연동</td>
</tr>
<tr>
<td><strong>6개월</strong></td>
<td>자기만의 방식</td>
<td>워크플로우 구축, 포트폴리오 완성</td>
</tr>
</tbody>
</table>
<h3 id="%EC%B6%94%EC%B2%9C-%EB%A6%AC%EC%86%8C%EC%8A%A4">추천 리소스</h3>
<table>
<thead>
<tr>
<th>대상</th>
<th>도구</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>공통</strong></td>
<td>Claude Desktop, ChatGPT, Gemini (무료)</td>
</tr>
<tr>
<td><strong>대학원생</strong></td>
<td>SciSpace, Connected Papers, Consensus</td>
</tr>
<tr>
<td><strong>교직원</strong></td>
<td>클로바노트 (월 600분 무료), 마음회의록</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="42" style="--paginate:true;--theme:default;" data-marpit-pagination-total="44" data-size="16:9">
<h2 id="act-4-%ED%95%B5%EC%8B%AC-%EB%A9%94%EC%8B%9C%EC%A7%80-%EC%98%A4%EB%8A%98%EB%B6%80%ED%84%B0-%EC%8B%9C%EC%9E%91%ED%95%98%EC%9E%90">Act 4 핵심 메시지: 오늘부터 시작하자</h2>
<p><strong>AI는 여러분을 대신하지 않습니다.</strong><br />
<strong>여러분의 능력을 확장할 뿐입니다.</strong></p>
<ul>
<li><strong>학생</strong>: 여러분의 학업이 더 창의적이고 즐거워지길</li>
<li><strong>대학원생</strong>: 여러분의 연구가 더 깊이 있고 빠르게 진행되길</li>
<li><strong>교직원</strong>: 여러분의 업무가 더 효율적이고 의미 있게 바뀌길</li>
