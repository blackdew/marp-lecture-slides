<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dfe6e9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="960" y="-80" fill="url(#bg1)"/>

  <!-- Section 1: 실행 해방 — 사슬→날개 -->
  <g transform="translate(300, 120)">
    <!-- 끊어진 사슬 -->
    <circle cx="-80" cy="0" r="30" fill="none" stroke="#7f8c8d" stroke-width="8" stroke-dasharray="15 10"/>
    <line x1="-60" y1="-20" x2="-40" y2="20" stroke="#e74c3c" stroke-width="6"/>
    <!-- 화살표 -->
    <polygon points="0,-8 30,0 0,8" fill="#2c3e50"/>
    <!-- 로켓 -->
    <ellipse cx="80" cy="0" rx="22" ry="35" fill="#3498db"/>
    <polygon points="80,-35 70,-50 90,-50" fill="#3498db"/>
    <circle cx="80" cy="-10" r="6" fill="white"/>
    <rect x="72" y="30" width="16" height="12" rx="3" fill="#f39c12"/>
    <text x="0" y="80" font-family="sans-serif" font-size="36" font-weight="bold" fill="#2c3e50" text-anchor="middle">실행 해방</text>
  </g>

  <!-- Section 2: 레버리지 — 지렛대 -->
  <g transform="translate(300, 370)">
    <!-- 지렛대 받침 -->
    <polygon points="0,40 -25,70 25,70" fill="#7f8c8d"/>
    <!-- 막대 -->
    <line x1="-120" y1="60" x2="120" y2="20" stroke="#2c3e50" stroke-width="8" stroke-linecap="round"/>
    <!-- 작은 힘 (왼쪽) -->
    <circle cx="-100" cy="30" r="18" fill="#3498db"/>
    <!-- 큰 결과 (오른쪽) -->
    <rect x="70" y="-20" width="60" height="40" rx="6" fill="#e74c3c" opacity="0.85"/>
    <text x="100" y="8" font-family="sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">×10</text>
    <text x="0" y="120" font-family="sans-serif" font-size="36" font-weight="bold" fill="#2c3e50" text-anchor="middle">레버리지</text>
  </g>

  <!-- Section 3: 아이디어 생존율 — Before/After 바 -->
  <g transform="translate(300, 620)">
    <!-- Before -->
    <rect x="-120" y="-30" width="80" height="60" rx="8" fill="#9b59b6" opacity="0.4"/>
    <text x="-80" y="5" font-family="sans-serif" font-size="30" font-weight="bold" fill="#9b59b6" text-anchor="middle">3</text>
    <!-- 화살표 -->
    <polygon points="0,-8 30,0 0,8" fill="#2c3e50"/>
    <!-- After -->
    <rect x="50" y="-50" width="80" height="100" rx="8" fill="#2ecc71" opacity="0.5"/>
    <text x="90" y="12" font-family="sans-serif" font-size="40" font-weight="bold" fill="#2ecc71" text-anchor="middle">7</text>
    <text x="0" y="100" font-family="sans-serif" font-size="36" font-weight="bold" fill="#2c3e50" text-anchor="middle">아이디어 생존</text>
  </g>
</svg>
