<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef6fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0fa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bgGrad6)" rx="0"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" font-family="sans-serif">일과 삶의 AI Agent 활용</text>
  <line x1="160" y1="60" x2="440" y2="60" stroke="#3498db" stroke-width="2" opacity="0.4"/>

  <!-- Central laptop icon -->
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="80" fill="#3498db" opacity="0.08"/>
    <circle cx="0" cy="0" r="60" fill="#3498db" opacity="0.15"/>

    <!-- Laptop body -->
    <rect x="-40" y="-25" width="80" height="50" rx="5" fill="#2c3e50"/>
    <!-- Screen -->
    <rect x="-35" y="-20" width="70" height="38" rx="2" fill="#e8f4fd"/>
    <!-- AI symbol on screen -->
    <text x="0" y="5" text-anchor="middle" font-size="20" fill="#3498db" font-family="sans-serif" font-weight="bold">AI</text>
    <!-- Laptop base -->
    <rect x="-50" y="27" width="100" height="6" rx="3" fill="#34495e"/>
    <!-- Touchpad -->
    <rect x="-10" y="29" width="20" height="2" rx="1" fill="#7f8c8d"/>
  </g>

  <!-- Role 1: 학생 (top-left) -->
  <g transform="translate(130, 120)">
    <circle cx="0" cy="0" r="40" fill="#2ecc71" opacity="0.12"/>
    <circle cx="0" cy="0" r="30" fill="#2ecc71"/>
    <!-- Document icon -->
    <rect x="-10" y="-14" width="20" height="26" rx="2" fill="none" stroke="white" stroke-width="2.5"/>
    <line x1="-5" y1="-5" x2="5" y2="-5" stroke="white" stroke-width="1.5"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="white" stroke-width="1.5"/>
    <line x1="-5" y1="5" x2="2" y2="5" stroke="white" stroke-width="1.5"/>
    <text x="0" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50" font-family="sans-serif">학생</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#7f8c8d" font-family="sans-serif">과제 리서치</text>
    <text x="0" y="80" text-anchor="middle" font-size="10" fill="#7f8c8d" font-family="sans-serif">발표 자료</text>
  </g>
  <!-- Connector to center -->
  <line x1="165" y1="155" x2="245" y2="180" stroke="#2ecc71" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Role 2: 대학원생 (top-right) -->
  <g transform="translate(470, 120)">
    <circle cx="0" cy="0" r="40" fill="#3498db" opacity="0.12"/>
    <circle cx="0" cy="0" r="30" fill="#3498db"/>
    <!-- Search/Research icon (magnifying glass) -->
    <circle cx="-3" cy="-3" r="8" fill="none" stroke="white" stroke-width="2.5"/>
    <line x1="3" y1="3" x2="9" y2="9" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50" font-family="sans-serif">대학원생</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#7f8c8d" font-family="sans-serif">논문 탐색</text>
    <text x="0" y="80" text-anchor="middle" font-size="10" fill="#7f8c8d" font-family="sans-serif">문헌 정리</text>
  </g>
  <!-- Connector to center -->
  <line x1="435" y1="155" x2="355" y2="180" stroke="#3498db" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Role 3: 교직원 (bottom-center) -->
  <g transform="translate(300, 310)">
    <circle cx="0" cy="0" r="40" fill="#f39c12" opacity="0.12"/>
    <circle cx="0" cy="0" r="30" fill="#f39c12"/>
    <!-- Clipboard/Briefcase icon -->
    <rect x="-12" y="-8" width="24" height="18" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
    <rect x="-5" y="-14" width="10" height="8" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <text x="0" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50" font-family="sans-serif">교직원</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#7f8c8d" font-family="sans-serif">회의록 자동화</text>
    <text x="0" y="80" text-anchor="middle" font-size="10" fill="#7f8c8d" font-family="sans-serif">문서 작성</text>
  </g>
  <!-- Connector to center -->
  <line x1="300" y1="280" x2="300" y2="240" stroke="#f39c12" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Bottom section: Before vs After -->
  <rect x="60" y="430" width="480" height="210" rx="16" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="300" y="460" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50" font-family="sans-serif">AI Agent를 쓰면 달라지는 것들</text>

  <!-- Before -->
  <rect x="80" y="480" width="210" height="140" rx="10" fill="#fff3cd"/>
  <text x="185" y="505" text-anchor="middle" font-size="14" font-weight="bold" fill="#856404" font-family="sans-serif">Before</text>
  <text x="100" y="530" font-size="12" fill="#856404" font-family="sans-serif">- 반복 작업에 시간 소모</text>
  <text x="100" y="550" font-size="12" fill="#856404" font-family="sans-serif">- 수동 정리와 검색</text>
  <text x="100" y="570" font-size="12" fill="#856404" font-family="sans-serif">- 전문 도구는 어려움</text>

  <!-- Arrow -->
  <text x="305" y="555" text-anchor="middle" font-size="28" fill="#3498db">→</text>

  <!-- After -->
  <rect x="310" y="480" width="210" height="140" rx="10" fill="#d4edda"/>
  <text x="415" y="505" text-anchor="middle" font-size="14" font-weight="bold" fill="#155724" font-family="sans-serif">After</text>
  <text x="330" y="530" font-size="12" fill="#155724" font-weight="bold" font-family="sans-serif">- AI가 초안과 구조화</text>
  <text x="330" y="550" font-size="12" fill="#155724" font-weight="bold" font-family="sans-serif">- 역할별 맞춤 도구</text>
  <text x="330" y="570" font-size="12" fill="#155724" font-weight="bold" font-family="sans-serif">- 누구나 쉽게 시작</text>

  <!-- Bottom message -->
  <rect x="80" y="680" width="440" height="50" rx="25" fill="#3498db" opacity="0.1"/>
  <text x="300" y="710" text-anchor="middle" font-size="15" font-weight="bold" fill="#3498db" font-family="sans-serif">AI Agent = 나만의 업무/학업 파트너</text>
</svg>
