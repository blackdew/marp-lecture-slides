<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bgGrad2)" rx="0"/>

  <!-- Title -->
  <text x="300" y="50" text-anchor="middle" font-size="26" font-weight="bold" fill="#2c3e50" font-family="sans-serif">프롬프트의 차이</text>
  <line x1="180" y1="70" x2="420" y2="70" stroke="#e74c3c" stroke-width="2" opacity="0.4"/>

  <!-- Bad prompt section -->
  <g transform="translate(300, 190)">
    <!-- X icon -->
    <circle cx="0" cy="-70" r="28" fill="#e74c3c" opacity="0.15"/>
    <circle cx="0" cy="-70" r="20" fill="#e74c3c"/>
    <line x1="-8" y1="-78" x2="8" y2="-62" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="-78" x2="-8" y2="-62" stroke="white" stroke-width="3" stroke-linecap="round"/>

    <text x="0" y="-25" text-anchor="middle" font-size="18" font-weight="bold" fill="#e74c3c" font-family="sans-serif">나쁜 프롬프트</text>

    <!-- Bad prompt box -->
    <rect x="-170" y="-10" width="340" height="70" rx="10" fill="white" stroke="#e74c3c" stroke-width="2" opacity="0.9"/>
    <text x="0" y="20" text-anchor="middle" font-size="20" fill="#555" font-family="sans-serif">"레포트 써줘"</text>
    <text x="0" y="45" text-anchor="middle" font-size="12" fill="#999" font-family="sans-serif">주제? 분량? 형식? 참고문헌?</text>

    <!-- Arrow down -->
    <path d="M0 70 L0 95 L-8 85 M0 95 L8 85" stroke="#e74c3c" stroke-width="2" fill="none"/>

    <!-- Result -->
    <rect x="-140" y="100" width="280" height="40" rx="8" fill="#fde8e8"/>
    <text x="0" y="125" text-anchor="middle" font-size="14" fill="#e74c3c" font-family="sans-serif">AI가 추측해서 채움 = 예측 불가능</text>
  </g>

  <!-- Divider -->
  <line x1="100" y1="380" x2="500" y2="380" stroke="#bdc3c8" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="300" y="405" text-anchor="middle" font-size="14" fill="#adb5bd" font-family="sans-serif">VS</text>

  <!-- Good prompt section -->
  <g transform="translate(300, 530)">
    <!-- Check icon -->
    <circle cx="0" cy="-70" r="28" fill="#2ecc71" opacity="0.15"/>
    <circle cx="0" cy="-70" r="20" fill="#2ecc71"/>
    <path d="M-8 -72 L-3 -63 L10 -78" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="0" y="-25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2ecc71" font-family="sans-serif">좋은 프롬프트</text>

    <!-- Good prompt box -->
    <rect x="-200" y="-10" width="400" height="130" rx="10" fill="white" stroke="#2ecc71" stroke-width="2" opacity="0.9"/>
    <text x="-180" y="15" font-size="13" fill="#333" font-family="sans-serif">수업: 소프트웨어공학 중간 리포트</text>
    <text x="-180" y="38" font-size="13" fill="#333" font-family="sans-serif">주제: 애자일 방법론</text>
    <text x="-180" y="61" font-size="13" fill="#333" font-family="sans-serif">구조: 서론-본론(3장)-결론</text>
    <text x="-180" y="84" font-size="13" fill="#333" font-family="sans-serif">분량: A4 5장 / 참고문헌: APA</text>
    <text x="-180" y="107" font-size="13" fill="#333" font-family="sans-serif">톤: 학술적, 객관적</text>

    <!-- Arrow down -->
    <path d="M0 130 L0 155 L-8 145 M0 155 L8 145" stroke="#2ecc71" stroke-width="2" fill="none"/>

    <!-- Result -->
    <rect x="-140" y="160" width="280" height="40" rx="8" fill="#e8f8e8"/>
    <text x="0" y="185" text-anchor="middle" font-size="14" fill="#27ae60" font-family="sans-serif">내 의도대로 = 원하는 결과물</text>
  </g>

  <!-- Bottom message -->
  <rect x="120" y="760" width="360" height="50" rx="25" fill="#3498db" opacity="0.1"/>
  <text x="300" y="790" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50" font-family="sans-serif">구체성 + 단계성 + 결과물 명시</text>
</svg>
