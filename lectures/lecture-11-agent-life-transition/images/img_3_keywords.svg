<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8ecf1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bgGrad)" rx="0"/>

  <!-- Title -->
  <text x="300" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#2c3e50" font-family="sans-serif">AI 시대 3가지 역할</text>
  <line x1="180" y1="80" x2="420" y2="80" stroke="#3498db" stroke-width="2" opacity="0.5"/>

  <!-- Keyword 1: Choice -->
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="70" fill="#3498db" opacity="0.12"/>
    <circle cx="0" cy="0" r="55" fill="#3498db" opacity="0.2"/>
    <circle cx="0" cy="0" r="42" fill="#3498db"/>
    <!-- Checkmark / Choice icon -->
    <path d="M-15 2 L-5 12 L18 -10" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="75" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" font-family="sans-serif">선택</text>
    <text x="0" y="100" text-anchor="middle" font-size="14" fill="#7f8c8d" font-family="sans-serif">Choice</text>
    <text x="0" y="125" text-anchor="middle" font-size="12" fill="#95a5a6" font-family="sans-serif">AI가 정보를 주면</text>
    <text x="0" y="145" text-anchor="middle" font-size="12" fill="#95a5a6" font-family="sans-serif">내가 판단한다</text>
  </g>

  <!-- Keyword 2: Planning -->
  <g transform="translate(300, 440)">
    <circle cx="0" cy="0" r="70" fill="#2ecc71" opacity="0.12"/>
    <circle cx="0" cy="0" r="55" fill="#2ecc71" opacity="0.2"/>
    <circle cx="0" cy="0" r="42" fill="#2ecc71"/>
    <!-- Clipboard / Plan icon -->
    <rect x="-12" y="-16" width="24" height="30" rx="3" fill="none" stroke="white" stroke-width="3"/>
    <rect x="-6" y="-20" width="12" height="6" rx="2" fill="white"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" stroke="white" stroke-width="2"/>
    <line x1="-6" y1="3" x2="6" y2="3" stroke="white" stroke-width="2"/>
    <line x1="-6" y1="10" x2="2" y2="10" stroke="white" stroke-width="2"/>
    <text x="0" y="75" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" font-family="sans-serif">계획</text>
    <text x="0" y="100" text-anchor="middle" font-size="14" fill="#7f8c8d" font-family="sans-serif">Planning</text>
    <text x="0" y="125" text-anchor="middle" font-size="12" fill="#95a5a6" font-family="sans-serif">구체적으로 지시하면</text>
    <text x="0" y="145" text-anchor="middle" font-size="12" fill="#95a5a6" font-family="sans-serif">AI가 더 잘 일한다</text>
  </g>

  <!-- Keyword 3: Documentation -->
  <g transform="translate(300, 680)">
    <circle cx="0" cy="0" r="70" fill="#e74c3c" opacity="0.12"/>
    <circle cx="0" cy="0" r="55" fill="#e74c3c" opacity="0.2"/>
    <circle cx="0" cy="0" r="42" fill="#e74c3c"/>
    <!-- Document icon -->
    <rect x="-12" y="-16" width="20" height="28" rx="2" fill="none" stroke="white" stroke-width="3"/>
    <path d="M8 -16 L8 -6 L18 -6" stroke="white" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <path d="M8 -16 L18 -6 L18 12 Q18 14 16 14 L-10 14" stroke="white" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <text x="0" y="75" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" font-family="sans-serif">문서화</text>
    <text x="0" y="100" text-anchor="middle" font-size="14" fill="#7f8c8d" font-family="sans-serif">Documentation</text>
    <text x="0" y="125" text-anchor="middle" font-size="12" fill="#95a5a6" font-family="sans-serif">AI가 기록하면</text>
    <text x="0" y="145" text-anchor="middle" font-size="12" fill="#95a5a6" font-family="sans-serif">나는 생각에 집중한다</text>
  </g>

  <!-- Connecting arrows -->
  <line x1="300" y1="355" x2="300" y2="375" stroke="#bdc3c8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="300" y1="595" x2="300" y2="615" stroke="#bdc3c8" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
