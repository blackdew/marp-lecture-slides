a 100%)}div#\:\$p > svg > foreignObject > section.action::before{content:"○ Plan → ○ Confirm → ● Action → ○ Document";color:#e74c3c;border-color:#e74c3c;background:linear-gradient(135deg, #fdedec 0%, #fadbd8 100%)}div#\:\$p > svg > foreignObject > section.document::before{content:"○ Plan → ○ Confirm → ○ Action → ● Document";color:#9b59b6;border-color:#9b59b6;background:linear-gradient(135deg, #f5eef8 0%, #ebdef0 100%)}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"]{columns:initial!important;display:block!important;padding:0!important}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"]::before, div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"]::after, div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="content"]::before, div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="content"]::after{display:none!important}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"] > div[data-marpit-advanced-background-container]{all:initial;display:flex;flex-direction:row;height:100%;overflow:hidden;width:100%}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"] > div[data-marpit-advanced-background-container][data-marpit-advanced-background-direction="vertical"]{flex-direction:column}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"][data-marpit-advanced-background-split] > div[data-marpit-advanced-background-container]{width:var(--marpit-advanced-background-split, 50%)}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"][data-marpit-advanced-background-split="right"] > div[data-marpit-advanced-background-container]{margin-left:calc(100% - var(--marpit-advanced-background-split, 50%))}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"] > div[data-marpi </foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="3" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h1 id="part-1">Part 1</h1>
<h2 id="%EC%9D%B8%ED%84%B4-%EC%9E%85%EC%82%AC--%EC%97%85%EB%AC%B4-%ED%99%98%EA%B2%BD-%EC%84%B8%ED%8C%85">인턴 입사 + 업무 환경 세팅</h2>
<h3 id="ai-agent-%EC%86%8C%EA%B0%9C--%ED%99%98%EA%B2%BD-%EC%84%A4%EC%A0%95">AI Agent 소개 + 환경 설정</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="4" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%9D%B4%EB%B2%88-%EC%8B%9C%EA%B0%84%EC%97%90-%EB%B0%B0%EC%9A%B8-%EB%82%B4%EC%9A%A9-part-1">이번 시간에 배울 내용 (Part 1)</h2>
<h3 id="part-1-%EC%8B%9C%EC%9E%91%ED%95%98%EA%B8%B0-50%EB%B6%84">Part 1: 시작하기 (50분)</h3>
<ul>
<li>&quot;AI Agent가 뭐죠?&quot; - 챗봇과 다른 점</li>
<li>Agent가 일하는 방법 (구조와 워크플로우)</li>
<li>내 컴퓨터에서 Agent 실행해보기</li>
</ul>
<p><strong>핵심 메시지</strong>: &quot;Agent = 도구를 쓸 줄 아는 똑똑한 동료&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="5" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="ai-agent%EB%9E%80">AI Agent란?</h2>
<h3 id="%EC%B1%97%EB%B4%87-vs-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8">챗봇 vs 에이전트</h3>
<table>
<thead>
<tr>
<th>구분</th>
<th>Chatbot</th>
<th>Agent</th>
</tr>
</thead>
<tbody>
<tr>
<td>역할</td>
<td>말만 함 (정보 제공)</td>
<td><strong>행동</strong>을 함 (실무 수행)</td>
</tr>
<tr>
<td>예시</td>
<td>&quot;여행 계획 텍스트 제공&quot;</td>
<td>&quot;비행기/호텔 예약 완료&quot;</td>
</tr>
<tr>
<td>한계</td>
<td>예약은 내가 직접</td>
<td>캘린더 등록, 메일 발송까지</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>&quot;생각만 하던 관리자(Manager)에게, 실행하는 유능한 인턴(Intern)이 생겼습니다.&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="6" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent%EC%9D%98-%EA%B5%AC%EC%A1%B0-4%EA%B0%80%EC%A7%80-%EC%9A%94%EC%86%8C">Agent의 구조 (4가지 요소)</h2>
<h3 id="agent--llm--memory--planning--tools">Agent = LLM + Memory + Planning + Tools</h3>
<table>
<thead>
<tr>
<th>요소</th>
<th>역할</th>
<th>비유</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>LLM (Brain)</strong></td>
<td>추론 및 결정</td>
<td>똑똑한 두뇌</td>
</tr>
<tr>
<td><strong>Memory (Context)</strong></td>
<td>기억 및 맥락</td>
<td>업무 수첩</td>
</tr>
<tr>
<td><strong>Planning (Strategy)</strong></td>
<td>계획 수립</td>
<td>업무 매뉴얼</td>
</tr>
<tr>
<td><strong>Tools (Action)</strong></td>
<td>실제 행동</td>
<td>손과 발</td>
</tr>
</tbody>
</table>
<blockquote>
<p>&quot;이 인턴의 잠재력은 엄청납니다. 단, <strong>좋은 사수(여러분을)</strong>를 만났을 때만 그렇습니다.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="7" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent-%EC%9B%8C%ED%81%AC%ED%94%8C%EB%A1%9C%EC%9A%B0">Agent 워크플로우</h2>
<h3 id="6%EB%8B%A8%EA%B3%84-%EC%9E%91%EC%97%85-%ED%9D%90%EB%A6%84">6단계 작업 흐름</h3>
<ol>
<li><strong>요구사항 (User/Manager)</strong>: &quot;김 대리(Agent), 이번 달 매출 분석해줘.&quot; (목표 제시)</li>
<li><strong>계획 (Agent/Intern)</strong>: &quot;네, 그럼 파일 A, B를 열어서 합치면 될까요?&quot; (계획 수립)</li>
<li><strong>확인 (User/Manager)</strong>: &quot;응, 맞아. 대신 날짜 형식은 꼭 맞춰.&quot; (승인 및 피드백)</li>
<li><strong>실행 (Agent/Intern)</strong>: (열심히 작업 중...) (도구 사용)</li>
<li><strong>검증 (User/Manager)</strong>: &quot;어? 여기 합계가 틀렸는데?&quot; (결과 검증)</li>
<li><strong>완료 (Completion)</strong>: &quot;수정했습니다. 여기 있습니다!&quot; (최종 보고)</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="8" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent-%EC%9B%8C%ED%81%AC%ED%94%8C%EB%A1%9C%EC%9A%B0-%EC%8B%9C%EA%B0%81%ED%99%94">Agent 워크플로우 (시각화)</h2>
<p><img src="images/img_agent_workflow.svg" alt="" style="width:1100px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="9" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent-%EC%9B%8C%ED%81%AC%ED%94%8C%EB%A1%9C%EC%9A%B0-%ED%95%B5%EC%8B%AC-%ED%8F%AC%EC%9D%B8%ED%8A%B8">Agent 워크플로우 핵심 포인트</h2>
<h3 id="user-%E2%86%92-agent-%E2%86%92-tools-%E2%86%92-result">User → Agent → Tools → Result</h3>
<table>
<thead>
<tr>
<th>단계</th>
<th>설명</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Planning</strong></td>
<td>Memory를 참조해 계획 수립</td>
</tr>
<tr>
<td><strong>Confirm</strong></td>
<td>사용자에게 확인 요청</td>
</tr>
<tr>
<td><strong>Execution</strong></td>
<td>Tools를 사용해 실제 작업 수행</td>
</tr>
<tr>
<td><strong>Verify</strong></td>
<td>결과 검증 (실패 시 재계획)</td>
</tr>
</tbody>
</table>
<blockquote>
<p>핵심: 피드백 루프를 통한 지속적 개선</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="10" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="web-agent-vs-cli-agent">Web Agent vs CLI Agent</h2>
<h3 id="%EC%99%9C-%ED%84%B0%EB%AF%B8%EB%84%90cli%EC%97%90%EC%84%9C-%EC%8B%A4%ED%96%89%ED%95%98%EB%82%98%EC%9A%94">왜 터미널(CLI)에서 실행하나요?</h3>
<table>
<thead>
<tr>
<th>구분</th>
<th>Web Agent</th>
<th>CLI Agent</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>환경</strong></td>
<td>웹 브라우저 (ChatGPT, Claude.ai)</td>
<td>터미널 (Gemini CLI, Claude Code)</td>
</tr>
<tr>
<td><strong>파일 접근</strong></td>
<td>파일 첨부만 가능</td>
<td>내 컴퓨터 파일 직접 읽기/쓰기</td>
</tr>
<tr>
<td><strong>코드 실행</strong></td>
<td>복사 → 붙여넣기 → 수동 실행</td>
<td>Agent가 직접 터미널에서 실행</td>
</tr>
<tr>
<td><strong>프로젝트</strong></td>
<td>파일 하나씩 첨부</td>
<td>전체 폴더 컨텍스트 이해</td>
</tr>
</tbody>
</table>
<h3 id="cli-agent%EC%9D%98-3%EA%B0%80%EC%A7%80-%EC%9E%A5%EC%A0%90">CLI Agent의 3가지 장점</h3>
<ul>
<li><strong>위임 (Delegation)</strong>: &quot;똑똑한 인턴에게 내 컴퓨터를 통째로 맡기고 일을 시키는 것&quot;</li>
<li><strong>맥락 (Context)</strong>: &quot;파일을 일일이 줄 필요 없이, 알아서 필요한 파일을 찾아보고 이해함&quot;</li>
<li><strong>누적 (Continuity)</strong>: &quot;한 번 하고 끝나는 게 아니라, 결과물 위에 추가 작업을 계속 쌓아갈 수 있음&quot;</li>
</ul>
<blockquote>
<p><strong>&quot;인턴에게 내 책상(컴퓨터)을 직접 쓰게 하면, 훨씬 빠르고 강력합니다.&quot;</strong></p>
</blockquote>
</section>

<h2 id="%EC%82%B0%EC%B6%9C%EB%AC%BC-%EC%B2%B4%ED%81%AC-part-3---%EC%8B%A4%EC%8A%B5">산출물 체크 (Part 3 - 실습)</h2>
<h3 id="%EC%8B%A4%EC%8A%B5-3-1-%ED%8F%B4%EB%8D%94-%EC%A0%95%EB%A6%AC">실습 3-1: 폴더 정리</h3>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-class="lead learn" data-theme="default" lang="ko-KR" class="lead learn" data-marpit-pagination="69" style="--paginate:true;--class:lead learn;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h1 id="learn-%ED%95%B5%EC%8B%AC-%EC%A0%95%EB%A6%AC-1">Learn: 핵심 정리</h1>
<p>질문하면서 배운 것 정리!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-class="learn" data-theme="default" lang="ko-KR" class="learn" data-marpit-pagination="70" style="--paginate:true;--class:learn;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="learn-%EC%9D%B4%EB%B2%88-%EC%8B%9C%EA%B0%84%EC%97%90-%EB%B0%B0%EC%9A%B4-%ED%95%B5%EC%8B%AC-1">[Learn] 이번 시간에 배운 핵심</h2>
<h3 id="%EC%8B%A4%EC%8A%B5%ED%95%98%EB%A9%B4%EC%84%9C-%EB%B0%B0%EC%9A%B4-%EA%B2%83-1">실습하면서 배운 것</h3>
<table>
<thead>
<tr>
<th>실습</th>
<th>배운 것</th>
<th>핵심</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>폴더 정리</strong></td>
<td>파일 분류/이동</td>
<td>반복 작업 자동화</td>
</tr>
<tr>
<td><strong>CSV 통합</strong></td>
<td>데이터 병합/변환</td>
<td>데이터 처리</td>
</tr>
<tr>
<td><strong>PDF 요약</strong></td>
<td>문서 읽기/핵심 추출</td>
<td>정보 정리</td>
</tr>
<tr>
<td><strong>메일 작성</strong></td>
<td>톤 조절/대상별 맞춤</td>
<td>커뮤니케이션</td>
</tr>
</tbody>
</table>
<h3 id="agent-%ED%99%9C%EC%9A%A9-%ED%95%B5%EC%8B%AC">Agent 활용 핵심</h3>
<ul>
<li><strong>다양한 파일 형식</strong> 처리 가능 (CSV, PDF, MD)</li>
<li><strong>톤과 형식</strong> 지정으로 원하는 결과물 생성</li>
</ul>
<blockquote>
<p><strong>&quot;단순 반복 업무는 인턴(AI)에게 위임하세요.&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="71" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h1 id="ai-%EC%8B%9C%EB%8C%80-%EC%9A%B0%EB%A6%AC%EC%9D%98-%EC%97%AD%ED%95%A0">AI 시대, 우리의 역할</h1>
<p>AI가 일상이 된 시대, 우리는 무엇을 해야 할까요?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="72" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="ai-%EC%8B%9C%EB%8C%80%EC%9D%98-3%EA%B0%80%EC%A7%80-%EC%97%AD%ED%95%A0">AI 시대의 3가지 역할</h2>
<table>
<thead>
<tr>
<th>키워드</th>
<th>핵심 개념</th>
<th>왜 중요한가?</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>1. 선택</strong></td>
<td><strong>의미</strong> - 나의 가치와 선호 반영</td>
<td>AI 결과물에 &quot;나&quot;를 담아야 내 것이 됨</td>
</tr>
<tr>
<td><strong>2. 계획</strong></td>
<td><strong>의도</strong> - 비어있는 컨텍스트 채우기</td>
<td>계획 없으면 엉뚱한 결과 / 계획에 시간 투자 필수</td>
</tr>
<tr>
<td><strong>3. 문서화</strong></td>
<td><strong>결과물</strong> - 문서 = 프로젝트</td>
<td>문서화로 성찰하고 반복하며 성장</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="73" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h1 id="1-%EC%84%A0%ED%83%9D-choice">1. 선택 (Choice)</h1>
<p>&quot;Life is C (Choice) between B (Birth) and D (Death)&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="74" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%84%A0%ED%83%9D%EC%9D%98-%EB%91%90-%EA%B0%80%EC%A7%80-%EC%9C%A0%ED%98%95">선택의 두 가지 유형</h2>
<h3 id="1-%EB%8B%A8%EC%88%9C-%EB%B9%84%EA%B5%90-%EC%84%A0%ED%83%9D">1. 단순 비교 선택</h3>
<ul>
<li>정보를 모으고 비교하면 <strong>최적의 답</strong>이 나오는 선택</li>
<li>예: 노트북 구매, 보고서 형식, 회의실 예약</li>
<li><strong>Agent가 대신 해줄 수 있는 영역</strong></li>
</ul>
<h3 id="2-%EA%B0%80%EC%B9%98%EC%9D%98-%EC%84%A0%ED%83%9D">2. 가치의 선택</h3>
<ul>
<li>비교만으로는 결정할 수 없는 선택</li>
<li>예: 어떤 일을 할지, 어떤 방향으로 갈지</li>
<li><strong>Agent는 도와줄 수 있지만, 결정은 나의 몫</strong></li>
</ul>
<blockquote>
<p>두 가지 선택 모두, Agent와 함께하면 더 나아집니다</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="75" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="1-%EB%8B%A8%EC%88%9C-%EB%B9%84%EA%B5%90-%EC%84%A0%ED%83%9D-1">1. 단순 비교 선택</h2>
<h3 id="%EA%B3%BC%EA%B1%B0%EC%9D%98-%ED%95%9C%EA%B3%84">과거의 한계</h3>
<ul>
<li>정보 수집에 <strong>3시간</strong>, 비교에 <strong>1시간</strong></li>
<li>결국 2-3개 옵션만 비교하고 선택</li>
<li>&quot;최선의 선택&quot;인지 확신 없음</li>
</ul>
<h3 id="agent%EC%99%80-%ED%95%A8%EA%BB%98%ED%95%98%EB%A9%B4">Agent와 함께하면</h3>
<ul>
<li>정보 수집 <strong>5분</strong>, 비교표 작성 <strong>5분</strong></li>
<li>10개 이상 옵션도 정교하게 비교 가능</li>
<li><strong>최적의 선택</strong>에 도달</li>
</ul>
<blockquote>
<p>직접할 때 느끼던 정보 수집과 분석의 한계를 인턴(AI)와 함께 넘어설 수 있습니다. 이제 관리자로서 지시하세요.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="76" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent%EA%B0%80-%EB%A7%8C%EB%93%9C%EB%8A%94-%EC%B5%9C%EC%A0%81%EC%9D%98-%EB%B9%84%EA%B5%90">Agent가 만드는 최적의 비교</h2>
<h3 id="%EC%98%88-%ED%88%AC%EC%9E%90-%EC%8B%9C%EC%9E%A5-%EB%B9%84%EA%B5%90">예: 투자 시장 비교</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>미장 vs 국장(KOSPI) 어디에 투자해야 해?
평균 수익, 최대 수익, 최대 손실 예측 범위도 알려줘.
</code></pre>
<table>
<thead>
<tr>
<th>시장</th>
<th>예상 평균수익</th>
<th>예상 최대수익</th>
<th>예상 최소수익</th>
<th>장점</th>
<th>리스크</th>
</tr>
</thead>
<tbody>
<tr>
<td>미장</td>
<td>+10~12%</td>
<td>+30%</td>
<td>-35%</td>
<td>빅테크, 달러 자산</td>
<td>환율, 양도세</td>
</tr>
<tr>
<td>국장</td>
<td>+8~15%</td>
<td>+50%</td>
<td>-40%</td>
<td>밸류업, 반도체, 배당</td>
<td>정치, 수급</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>비교가 정교할수록, 선택도 정확해집니다</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="77" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="2-%EA%B0%80%EC%B9%98%EC%9D%98-%EC%84%A0%ED%83%9D-1">2. 가치의 선택</h2>
<h3 id="agent%EC%97%90%EA%B2%8C-%EB%A7%A1%EA%B8%B8-%EC%88%98-%EC%97%86%EB%8A%94-%EC%98%81%EC%97%AD">Agent에게 맡길 수 없는 영역</h3>
<ul>
<li>&quot;어떤 커리어를 선택할까?&quot;</li>
<li>&quot;이 프로젝트에 참여할까?&quot;</li>
<li>&quot;우리 팀의 방향은?&quot;</li>
</ul>
<h3 id="agent%EA%B0%80-%EB%8F%84%EC%99%80%EC%A4%84-%EC%88%98-%EC%9E%88%EB%8A%94-%EA%B2%83">Agent가 도와줄 수 있는 것</h3>
<ul>
<li>각 선택지의 <strong>장단점 분석</strong></li>
<li>선택 결과의 <strong>예측과 시뮬레이션</strong></li>
<li>각 선택지를 <strong>최적화</strong>해서 보여주기</li>
</ul>
<h3 id="%ED%95%98%EC%A7%80%EB%A7%8C-%EC%B5%9C%EC%A2%85-%EA%B2%B0%EC%A0%95%EC%9D%80">하지만 최종 결정은</h3>
<p><strong>나의 가치관</strong>으로 내리는 것</p>
<blockquote>
<p><strong>&quot;같은 비교표를 보고도, 사람마다 다른 선택을 합니다. 그게 '나'입니다.&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="78" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%98%A4%EB%8A%98-%EC%8B%A4%EC%8A%B5%EC%97%90%EC%84%9C%EC%9D%98-%EC%84%A0%ED%83%9D">오늘 실습에서의 선택</h2>
<h3 id="%EB%8B%A8%EC%88%9C-%EB%B9%84%EA%B5%90-%EC%84%A0%ED%83%9D-agent%EA%B0%80-%EC%B5%9C%EC%A0%81%ED%99%94">단순 비교 선택 (Agent가 최적화)</h3>
<ul>
<li>폴더 분류 방법: 확장자별 vs 날짜별 vs 크기별</li>
<li>날짜 형식: YYYY-MM-DD vs DD/MM/YYYY</li>
<li>→ Agent가 비교표 제시, 상황에 맞는 최적 선택</li>
</ul>
<h3 id="%EA%B0%80%EC%B9%98%EC%9D%98-%EC%84%A0%ED%83%9D-%EB%82%B4%EA%B0%80-%EA%B2%B0%EC%A0%95">가치의 선택 (내가 결정)</h3>
<ul>
<li>고퀄 vs 가성비 vs 밸런스</li>
<li>편안한 문체 vs 정중한 문체</li>
<li>→ 정답이 없는 선택, 나의 취향대로</li>
</ul>
<blockquote>
<p><strong>두 가지 선택 모두, Agent와 함께하면 더 나은 결과가 됩니다</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="79" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EA%B0%80%EC%9E%A5-%EC%A4%91%EC%9A%94%ED%95%9C-%EC%84%A0%ED%83%9D-%ED%92%80-%EB%AC%B8%EC%A0%9C%EC%9D%98-%EC%84%A0%ED%83%9D">가장 중요한 선택: 풀 문제의 선택</h2>
<h3 id="%EB%AA%A8%EB%93%A0-%EB%AC%B8%EC%A0%9C%EB%A5%BC-%EB%8B%A4-%ED%92%80-%EC%88%98%EB%8A%94-%EC%97%86%EC%8A%B5%EB%8B%88%EB%8B%A4">모든 문제를 다 풀 수는 없습니다</h3>
<ul>
<li>시간은 한정되어 있고</li>
<li>문제는 무한히 많습니다</li>
<li><strong>어떤 문제를 풀지 선택하는 것</strong>이 가장 중요한 일</li>
</ul>
<h3 id="ai-%EC%8B%9C%EB%8C%80-%EC%9D%B4-%EC%84%A0%ED%83%9D%EC%9D%B4-%EB%8D%94-%EC%A4%91%EC%9A%94%ED%95%B4%EC%A7%84-%EC%9D%B4%EC%9C%A0">AI 시대, 이 선택이 더 중요해진 이유</h3>
<ul>
<li>Agent가 실행을 대신해주니까</li>
<li><strong>무엇을 시킬지 결정하는 것</strong>이 인간의 핵심 역할</li>
<li>잘못된 문제를 빠르게 푸는 것보다, 올바른 문제를 선택하는 것</li>
</ul>
<blockquote>
<p><strong>&quot;Agent에게 시킬 문제를 고르는 것, 그것이 우리의 가장 중요한 선택입니다.&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="80" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h1 id="2-%EA%B3%84%ED%9A%8D-planning">2. 계획 (Planning)</h1>
<p>왜 AI 시대에 계획이 더 중요해졌는가?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="81" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent%EA%B0%80-%ED%97%A4%EB%A7%A4%EB%8A%94-%EC%9D%B4%EC%9C%A0">Agent가 헤매는 이유</h2>
<p>Agent를 써봤는데 잘 안 되는 경험, 해보셨나요? 하게 될 겁니다.</p>
<blockquote>
<p>&quot;시킨 대로 안 해서 포기했어요&quot;<br />
&quot;뭘 해달라고 해도 엉뚱한 결과만 나와요&quot;<br />
&quot;차라리 내가 직접 하는 게 빨라요&quot;</p>
</blockquote>
<p>Agent의 능력이 부족해서가 아닙니다.<br />
인턴(AI)에 대한 이해가 부족하고, <strong>지시(Prompt)</strong>가 불완전하기 때문입니다.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="82" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%ED%8F%B4%EB%8D%94-%EC%A0%95%EB%A6%AC%ED%95%B4%EC%A4%98-vs-%EC%9D%B4%EB%A0%87%EA%B2%8C-%EC%A0%95%EB%A6%AC%ED%95%B4%EC%A4%98">&quot;폴더 정리해줘&quot; vs &quot;이렇게 정리해줘&quot;</h2>
<h3 id="%EB%91%90-%EA%B0%80%EC%A7%80-%EC%A7%80%EC%8B%9C">두 가지 지시</h3>
<p><strong>지시 A:</strong> &quot;다운로드 폴더 정리해줘&quot;<br />
→ Agent가 만든 결과: ???</p>
<p><strong>지시 B:</strong> &quot;다운로드 폴더에서 이미지는 images/, 문서는 documents/, 동영상은 videos/로 이동해줘&quot;<br />
→ Agent가 만든 결과: 정확히 원하는 대로!</p>
<p><strong>차이는 무엇인가요?</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="83" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EA%B3%84%ED%9A%8D--%EB%82%98%EC%9D%98-%EC%9D%98%EB%8F%84%EB%A5%BC-%EB%AA%85%ED%99%95%ED%9E%88-%ED%95%98%EB%8A%94-%EA%B2%83">계획 = 나의 의도를 명확히 하는 것</h2>
<h3 id="%EB%B9%84%EC%96%B4%EC%9E%88%EB%8A%94-%EC%BB%A8%ED%85%8D%EC%8A%A4%ED%8A%B8%EC%9D%98-%EC%9C%84%ED%97%98">비어있는 컨텍스트의 위험</h3>
<p><strong>&quot;다운로드 폴더 정리해줘&quot;</strong></p>
<p>Agent가 추론으로 채우는 것들:</p>
<ul>
<li>어떤 기준으로? → <strong>&quot;날짜순&quot;</strong>으로 추론</li>
<li>어디로 이동? → <strong>&quot;분류 안함, 이름만 변경&quot;</strong>으로 추론</li>
<li>어떤 파일 형식? → <strong>&quot;모든 파일&quot;</strong>으로 추론</li>
<li>중복 파일은? → <strong>&quot;그냥 둠&quot;</strong>으로 추론</li>
</ul>
<p><strong>→ 지시자의 의도: &quot;확장자별 분류 + 폴더 생성 + 이동&quot;</strong></p>
<p><strong>결과: 전혀 다른 정리 결과가 나옴</strong></p>
<blockquote>
<p>AI는 비어있는 컨텍스트를 정말 잘 채웁니다. 그런데 그게 지시자의 의도와 다를 수 있습니다.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="84" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="ai-%EC%8B%9C%EB%8C%80%EC%97%90-%EA%B3%84%ED%9A%8D%EC%9D%B4-%EB%8D%94-%EC%A4%91%EC%9A%94%ED%95%9C-%EC%9D%B4%EC%9C%A0">AI 시대에 계획이 더 중요한 이유</h2>
<h3 id="%EA%B3%BC%EA%B1%B0-ai-%EC%97%86%EC%9D%84-%EB%95%8C">과거 (AI 없을 때)</h3>
<ul>
<li>계획 시간: 20%</li>
<li>실행 시간: 80%</li>
<li><strong>실행이 어려웠음</strong> → 실행에 시간 집중</li>
</ul>
<h3 id="%ED%98%84%EC%9E%AC-ai-%EC%8B%9C%EB%8C%80">현재 (AI 시대)</h3>
<ul>
<li>계획 시간: <strong>60-70%</strong></li>
<li>실행 시간: 30-40%</li>
<li><strong>실행은 쉬움</strong> → <strong>계획에 시간 집중</strong></li>
</ul>
<blockquote>
<p>AI 시대는 <strong>&quot;계획(지시)의 시대&quot;</strong>입니다. 계획이 곧 결과를 결정합니다.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="85" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%A2%8B%EC%9D%80-%EA%B3%84%ED%9A%8D%EC%9D%98-3%EC%9B%90%EC%B9%99">좋은 계획의 3원칙</h2>
<table>
<thead>
<tr>
<th>원칙</th>
<th>나쁜 예</th>
<th>좋은 예</th>
<th>효과</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>1. 구체성</strong></td>
<td>&quot;정리해줘&quot;</td>
<td>&quot;다운로드 폴더의 PDF를 년도별로 정리&quot;</td>
<td>의도 명확</td>
</tr>
<tr>
<td><strong>2. 단계성</strong></td>
<td>&quot;분석해줘&quot;</td>
<td>&quot;1) CSV 로드 2) 중복 제거 3) 집계&quot;</td>
<td>과정 통제</td>
</tr>
<tr>
<td><strong>3. 결과물 명시</strong></td>
<td>&quot;요약해줘&quot;</td>
<td>&quot;3문장으로 summary.md로 저장&quot;</td>
<td>검증 가능</td>
</tr>
</tbody>
</table>
<h3 id="%ED%95%B5%EC%8B%AC">핵심</h3>
<ul>
<li><strong>과거:</strong> 빨리 실행하는 게 중요</li>
<li><strong>현재:</strong> <strong>잘 계획하는 게 중요</strong></li>
</ul>
<blockquote>
<p>계획 = 나의 의도를 AI에게 정확히 전달하는 것</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="86" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%A2%8B%EC%9D%80-%EA%B3%84%ED%9A%8D%EC%9D%84-%EB%A7%8C%EB%93%9C%EB%8A%94-%EA%B2%83%EB%8F%84-%ED%95%A8%EA%BB%98%ED%95%98%EC%84%B8%EC%9A%94">좋은 계획을 만드는 것도 함께하세요</h2>
<h3 id="%EA%B3%BC%EA%B1%B0-%EB%B0%A9%EC%8B%9D-%EC%99%84%EB%B2%BD%ED%95%9C-%EA%B3%84%ED%9A%8D-%E2%86%92-%EC%8B%A4%ED%96%89">과거 방식: 완벽한 계획 → 실행</h3>
<p>처음부터 완벽한 프롬프트를 작성하려고 하면 어렵습니다.</p>
<h3 id="%EC%83%88%EB%A1%9C%EC%9A%B4-%EB%B0%A9%EC%8B%9D-agent%EC%99%80-%ED%95%A8%EA%BB%98-%EA%B3%84%ED%9A%8D-%EB%A7%8C%EB%93%A4%EA%B8%B0">새로운 방식: Agent와 함께 계획 만들기</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>&quot;다운로드 폴더를 정리하려고 해. 계획을 내게 제시해줘.&quot;
</code></pre>
<p>→ Agent가 계획을 제안하면, 함께 다듬어 가세요:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>&quot;지금 계획에서 부족한 부분이 있는지 평가해줘&quot;
&quot;놓치고 있는 부분이 있는지 파악해줘&quot;
&quot;과하지 않게 딱 필요한 것만으로 최적화해줘&quot;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="87" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent%EC%99%80-%EA%B3%84%ED%9A%8D-%EC%84%B8%EC%9A%B0%EA%B8%B0">Agent와 계획 세우기</h2>
<table>
<thead>
<tr>
<th>상황</th>
<th>프롬프트</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>시작</strong></td>
<td>&quot;~하려고 해. 계획을 제시해줘&quot;</td>
</tr>
<tr>
<td><strong>부족함 점검</strong></td>
<td>&quot;이 계획에서 부족한 부분 평가해줘&quot;</td>
</tr>
<tr>
<td><strong>누락 점검</strong></td>
<td>&quot;놓치고 있는 부분이 있는지 파악해줘&quot;</td>
</tr>
<tr>
<td><strong>최적화</strong></td>
<td>&quot;과하지 않게 필요한 것만 최적화해줘&quot;</td>
</tr>
<tr>
<td><strong>구체화</strong></td>
<td>&quot;2번 단계를 더 구체적으로 설명해줘&quot;</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>계획을 인턴(AI)과 함께 만들어가는 것이 새로운 시대의 두번째 핵심입니다.</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="88" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h1 id="3-%EB%AC%B8%EC%84%9C%ED%99%94-documentation">3. 문서화 (Documentation)</h1>
<p>AI와 소통하는 가장 완전한 언어</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="89" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EB%AC%B8%EC%84%9C%ED%99%94-%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8%EC%9D%98-%EC%99%84%EC%A0%84%ED%95%9C-%EA%B8%B0%EB%A1%9D%EA%B3%BC-%ED%99%95%EC%9E%A5">문서화: 프로젝트의 완전한 기록과 확장</h2>
<h3 id="1-%EC%A0%95%ED%99%95%ED%95%9C-%EA%B8%B0%EB%A1%9D-record">1. 정확한 기록 (Record)</h3>
<ul>
<li>단순한 결과물이 아닌, <strong>설계도(PLAN)와 의도(Context)</strong>를 보존합니다.</li>
<li>현재의 상태와 작업 히스토리까지 <strong>완전하게 캡처</strong>합니다.</li>
<li><strong>&quot;기억(Memory)은 사라지지만, 기록(Archive)은 자산으로 남습니다.&quot;</strong></li>
</ul>
<h3 id="2-%EA%B0%80%EB%8A%A5%EC%84%B1%EC%9D%98-%ED%99%95%EC%9E%A5-possibilities">2. 가능성의 확장 (Possibilities)</h3>
<ul>
<li><strong>추적성 (Traceability)</strong>: 문제 발생 시 원인을 즉시 파악</li>
<li><strong>유연성 (Agility)</strong>: 업무 변경이나 담당자 교체에 즉각 대응</li>
<li><strong>효율성 (Efficiency)</strong>: 불필요한 맥락 설명 비용 제거 (비용 절감)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="90" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="90" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EA%B7%B8%EB%9F%B0%EB%8D%B0-%EC%99%9C-%EC%9A%B0%EB%A6%B0-%EC%95%88-%ED%96%88%EC%9D%84%EA%B9%8C%EC%9A%94">그런데 왜 우린 안 했을까요?</h2>
<h3 id="%EC%9D%B4%EC%A0%90%EC%9D%84-%EB%AA%B0%EB%9D%BC%EC%84%9C%EA%B0%80-%EC%95%84%EB%8B%99%EB%8B%88%EB%8B%A4">이점을 몰라서가 아닙니다</h3>
<ul>
<li>누구나 문서화가 좋은 건 압니다.</li>
<li>하지만 <strong>&quot;비용(Cost)이 너무 컸기 때문&quot;</strong>입니다.</li>
<li>작성하고, 정리하고, 업데이트하는 시간...</li>
</ul>
<blockquote>
<p><strong>&quot;그동안은 사람이 직접 하기에 배보다 배꼽이 더 큰 작업이었습니다.&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="91" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="91" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent-%EC%8B%9C%EB%8C%80-%EB%B9%84%EB%A1%9C%EC%86%8C-%EA%B0%80%EB%8A%A5%ED%95%B4%EC%A7%80%EB%8B%A4">Agent 시대, 비로소 가능해지다</h2>
<h3 id="%EB%B6%88%EA%B0%80%EB%8A%A5%ED%96%88%EB%8D%98-%EA%B2%83%EC%9D%B4-%EC%9D%BC%EC%83%81%EC%9D%B4-%EB%90%A9%EB%8B%88%EB%8B%A4">불가능했던 것이 일상이 됩니다</h3>
<ul>
<li>Agent에게 문서화는 가장 쉬운 일 중 하나입니다.</li>
<li><strong>저비용 고효율</strong>로 '제대로 된 문서화'를 할 수 있는 시대가 열렸습니다.</li>
<li>Agent는 작성, 정리, 업데이트를 대신 해줍니다.</li>
</ul>
<blockquote>
<p><strong>&quot;이제 비용 핑계는 댈 수 없습니다. 비전 때문에 문서를 만드세요.&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="92" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="92" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EA%B4%80%EB%A6%AC%EC%9E%90%EB%8A%94-%EB%AC%B8%EC%84%9C%EB%A1%9C-%ED%99%95%EC%9D%B8%ED%95%A9%EB%8B%88%EB%8B%A4">관리자는 '문서'로 확인합니다</h2>
<h3 id="%EC%8B%A4%ED%96%89%EC%9D%84-%EC%A0%84%EC%88%98-%EC%A1%B0%EC%82%AC%ED%95%98%EC%A7%80-%EB%A7%88%EC%84%B8%EC%9A%94">실행을 전수 조사하지 마세요</h3>
<ul>
<li>AI가 수행한 모든 실행(코드)을 하나하나 확인하는 건 어렵습니다.</li>
<li><strong>&quot;인턴에게 결과 보고서를 제출하게 하고, 그 문서를 보고 판단하세요.&quot;</strong></li>
<li>문서가 정확하다면 1차 검증은 끝난 것입니다.</li>
</ul>
<blockquote>
<p><strong>&quot;문서 중심 확인(Document-Based Verification)이 새로운 관리 방식입니다.&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="93" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="93" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%9D%B8%ED%84%B4%EC%97%90%EA%B2%8C-%EC%8B%A4%ED%96%89-%EA%B2%B0%EA%B3%BC-%EB%B3%B4%EA%B3%A0%EB%B0%9B%EA%B8%B0">인턴에게 실행 결과 보고받기</h2>
<p><strong>프롬프트</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>오늘 수행한 Part 3 실습(폴더 정리, CSV 통합)에 대한 실행 결과를 설명해줘.

포함 내용:
1. 주요 실행 내용 요약
2. 초기 계획과 달라진 점 (변경 사항)
3. 검토가 필요한 지점 (Checkpoints)
4. 잠재적 우려 사항 (Risks)
</code></pre>
<p><strong>확인</strong>:</p>
<ul>
<li>Agent의 답변을 읽고, 의도한 대로 작업이 수행되었는지 <strong>검증(Verify)</strong>하세요.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="94" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="94" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%99%84%EC%A0%84%ED%95%9C-%EA%B8%B0%EB%A1%9D%EC%9C%BC%EB%A1%9C-%EB%82%A8%EA%B8%B0%EA%B8%B0">완전한 기록으로 남기기</h2>
<p>검증이 끝났다면, 그 내용을 문서에 반영해야 합니다. 이것이 바로 <strong>&quot;프로젝트의 완전한 기록&quot;</strong>입니다.</p>
<p><strong>프롬프트</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>보고해준 내용을 바탕으로 현재 프로젝트의 상태를 보여주는 문서를 업데이트해줘.
README.md 혹은 관련 문서에 실행 결과, 변경 사항, 체크포인트를 반영해서 기록을 남겨줘.
</code></pre>
<blockquote>
<p><strong>&quot;실행된 결과가 문서와 일치될 때, 비로소 프로젝트는 자산이 됩니다.&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="95" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="95" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8-%EB%B4%89%EC%9D%B8-git">프로젝트 봉인 (Git)</h2>
<ul>
<li>문서 확인이 끝났다면, 전체 프로젝트를 <strong>'저장'</strong>합시다.</li>
<li>인턴(Agent)이 엉뚱한 코드를 짜서, 잘 되던 기능까지 망치는 것을 방지합니다.</li>
</ul>
<h3 id="gemini%EC%97%90%EA%B2%8C-%EC%9A%94%EC%B2%AD-4">Gemini에게 요청</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>보고서 확인했어.
지금까지의 작업물(코드+문서)을 git에 저장(Commit)해줘.
</code></pre>
<blockquote>
<p><strong>&quot;이 한 마디로, 여러분의 프로젝트는 안전하게 보존됩니다.&quot;</strong></p>
</blockquote>
<ol>
<li><strong>첫 저장이라면</strong>: &quot;초기화(Init)할까요?&quot;라고 물어봅니다. → <strong>Yes</strong></li>
<li><strong>변경사항 확인</strong>: &quot;이런 파일들이 추가됩니다&quot;라고 보고합니다.</li>
<li><strong>기록 완료</strong>: &quot;커밋되었습니다&quot;라고 완료합니다.</li>
</ol>
<blockquote>
<p><strong>이 한 마디로, 여러분의 코드는 안전하게 저장되었습니다.</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="96" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="96" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="part-3-%EC%A0%95%EB%A6%AC-%EC%9D%B8%ED%84%B4-%EA%B4%80%EB%A6%AC%EC%9D%98-%EA%B8%B0%EB%B3%B8%EA%B8%B0">Part 3 정리: 인턴 관리의 기본기</h2>
<h3 id="%EA%B4%80%EB%A6%AC%EC%9E%90%EC%9D%98-3%EA%B0%80%EC%A7%80-%EC%97%AD%ED%95%A0">관리자의 3가지 역할</h3>
<table>
<thead>
<tr>
<th>역할</th>
<th>핵심</th>
<th>방법</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>1. 선택</strong></td>
<td>무엇을 시킬지 결정</td>
<td>&quot;이 일은 인턴에게 맡기자&quot;</td>
</tr>
<tr>
<td><strong>2. 계획</strong></td>
<td>인턴과 함께 만들기</td>
<td>&quot;계획 제시해줘&quot; → 함께 다듬기</td>
</tr>
<tr>
<td><strong>3. 문서화</strong></td>
<td>보고받고 확인</td>
<td>인턴이 보고 → 문서로 검증</td>
</tr>
</tbody>
</table>
<h3 id="%EC%9D%B8%ED%84%B4-%EA%B4%80%EB%A6%AC%EC%9D%98-%ED%95%B5%EC%8B%AC">인턴 관리의 핵심</h3>
<ol>
<li><strong>반복</strong>: 한 번에 완벽 X → 작게 자주 확인</li>
<li><strong>계획</strong>: 혼자 세우지 말고 → 인턴과 함께</li>
</ol>
<blockquote>
<p><strong>&quot;인턴이 실행해줘도, 결정은 관리자의 몫입니다&quot;</strong></p>
</blockquote>
<h3 id="%EB%8B%A4%EC%9D%8C-%EC%8B%9C%EA%B0%84-%EC%98%88%EA%B3%A0-2">다음 시간 예고</h3>
<blockquote>
<p>&quot;인턴이 익숙해졌으니, 함께 프로젝트를 진행해봅시다.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="97" data-paginate="true" data-class="lead" data-theme="default" lang="ko-KR" class="lead" data-marpit-pagination="97" style="--paginate:true;--class:lead;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">

<th>단계</th>
<th>내용</th>
<th>시간</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>안내</strong></td>
<td>진행 방법 및 주제 선택</td>
<td>5분</td>
</tr>
<tr>
<td><strong>개인 작업</strong></td>
<td>하고 싶은 것을 만들기</td>
<td>30분</td>
</tr>
<tr>
<td><strong>선택적 공유</strong></td>
<td>원하는 사람만 간단히 공유</td>
<td>5분</td>
</tr>
</tbody>
</table>
<p><strong>핵심</strong>: 평가 없음, 완성도 무관, Agent 경험이 목표</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="126" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="126" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%ED%95%B4%EC%BB%A4%ED%86%A4-%EC%9B%90%EC%B9%99">해커톤 원칙</h2>
<p><strong>참여 방식</strong>: 각자 개인으로 참여</p>
<p><strong>평가</strong>: 없음! 순위도 없음!</p>
<p><strong>목표</strong>:</p>
<ul>
<li>Agent를 최대한 써보기</li>
<li>하고 싶었던 것 시도하기</li>
<li>실패해도 괜찮아요</li>
</ul>
<p><strong>원칙</strong>:</p>
<ul>
<li>완벽함보다 시도하는 것</li>
<li>결과보다 과정이 중요</li>
<li>막히면 언제든 질문</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="127" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="127" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EB%AC%B4%EC%97%87%EC%9D%84-%EB%A7%8C%EB%93%A4-%EC%88%98-%EC%9E%88%EC%9D%84%EA%B9%8C">무엇을 만들 수 있을까?</h2>
<p><strong>자유 주제!</strong> 하고 싶은 것 무엇이든:</p>
<table>
<thead>
<tr>
<th>카테고리</th>
<th>예시</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>실무 자동화</strong></td>
<td>내 업무 데이터 정리, 보고서 템플릿</td>
</tr>
<tr>
<td><strong>편의 도구</strong></td>
<td>타이머, 계산기, 투표 페이지</td>
</tr>
<tr>
<td><strong>재미있는 것</strong></td>
<td>랜덤 메뉴 선택기, 명언 생성기</td>
</tr>
<tr>
<td><strong>학습용</strong></td>
<td>오늘 배운 내용 정리, README 작성</td>
</tr>
<tr>
<td><strong>실험</strong></td>
<td>Agent가 어디까지 할 수 있는지 테스트</td>
</tr>
</tbody>
</table>
<p><strong>중요</strong>: 거창하지 않아도 됩니다. 작은 것부터!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="128" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="128" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%A3%BC%EC%A0%9C-%EC%A0%95%ED%95%98%EA%B8%B0-%EC%A7%80%EA%B8%88-5%EB%B6%84">주제 정하기 (지금 5분)</h2>
<p><strong>3가지 질문으로 주제 정하기</strong>:</p>
<ol>
<li>
<p><strong>오늘 배운 것 중 뭐가 제일 재미있었나요?</strong></p>
<ul>
<li>CSV? HTML? 크롤링?</li>
<li>→ 그걸로 뭔가 만들어보기</li>
</ul>
</li>
<li>
<p><strong>실무에서 뭐가 제일 귀찮나요?</strong></p>
<ul>
<li>반복 작업? 데이터 정리? 문서 작성?</li>
<li>→ Agent한테 시켜보기</li>
</ul>
</li>
<li>
<p><strong>그냥 해보고 싶은 게 있나요?</strong></p>
<ul>
<li>웹사이트? 게임? 도구?</li>
<li>→ 일단 시도해보기</li>
</ul>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="129" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="129" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%8B%9C%EC%9E%91-%EC%A0%84-%EC%B2%B4%ED%81%AC%EB%A6%AC%EC%8A%A4%ED%8A%B8">시작 전 체크리스트</h2>
<p><strong>준비</strong>:</p>
<ul>
<li>[ ] 주제를 종이에 한 줄로 적었나요?</li>
<li>[ ] 30분 안에 가능한 범위인가요?</li>
<li>[ ] Plan 모드를 켤 준비가 되었나요?</li>
</ul>
<p><strong>마음가짐</strong>:</p>
<ul>
<li>[ ] 완성 못 해도 괜찮다 ✓</li>
<li>[ ] 실패해도 괜찮다 ✓</li>
<li>[ ] 재미있으면 그만이다 ✓</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="130" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="130" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%9E%91%EC%97%85-%EC%8B%9C%EA%B0%84-30%EB%B6%84">작업 시간 (30분)</h2>
<p><strong>타임라인</strong>:</p>
<table>
<thead>
<tr>
<th>시간</th>
<th>활동</th>
<th>팁</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>0-5분</strong></td>
<td>주제 정하기</td>
<td>너무 어렵게 생각하지 말기</td>
</tr>
<tr>
<td><strong>5-10분</strong></td>
<td>첫 프롬프트 작성</td>
<td>Plan 모드로 시작</td>
</tr>
<tr>
<td><strong>10-25분</strong></td>
<td>Agent와 작업</td>
<td>막히면 손들기</td>
</tr>
<tr>
<td><strong>25-30분</strong></td>
<td>정리</td>
<td>안 끝나도 OK</td>
</tr>
</tbody>
</table>
<p><strong>강사의 역할</strong>:</p>
<ul>
<li>순회하며 도움</li>
<li>막힌 분께 프롬프트 개선 제안</li>
<li>시간 안내 (20분 경과, 10분 남음)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="131" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="131" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%9E%91%EC%97%85-%EC%A4%91-%EB%8F%84%EC%9B%80%EB%A7%90">작업 중 도움말</h2>
<p><strong>막혔을 때</strong>:</p>
<ol>
<li>
<p><strong>프롬프트를 더 구체적으로</strong></p>
<ul>
<li>나쁨: &quot;웹사이트 만들어줘&quot;</li>
<li>좋음: &quot;버튼 2개 있는 간단한 HTML 만들어줘&quot;</li>
</ul>
</li>
<li>
<p><strong>단계를 나눠서</strong></p>
<ul>
<li>한 번에 다 하지 말고</li>
<li>하나씩 차근차근</li>
</ul>
</li>
<li>
<p><strong>Plan 모드 활용</strong></p>
<ul>
<li><code>Shift+Tab</code> 두 번</li>
<li>계획 보고 수정하기</li>
</ul>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="132" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="132" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%9E%98-%EC%95%88-%EB%90%A0-%EB%95%8C">잘 안 될 때</h2>
<p><strong>Agent가 이상하게 동작하면</strong>:</p>
<ol>
<li><code>/clear</code> 입력 → 대화 초기화</li>
<li>프롬프트를 다시 간단하게</li>
<li>손들고 도움 요청</li>
</ol>
<p><strong>시간이 부족하면</strong>:</p>
<ol>
<li>범위 줄이기</li>
<li>핵심 기능만 남기기</li>
<li>디자인은 나중에</li>
</ol>
<p><strong>포기하고 싶으면</strong>:</p>
<ol>
<li>잠깐 쉬기</li>
<li>다른 주제로 변경 OK</li>
<li>실패도 경험이에요!</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="133" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="133" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%8B%A4%ED%8C%A8%ED%95%B4%EB%8F%84-%EA%B4%9C%EC%B0%AE%EC%8A%B5%EB%8B%88%EB%8B%A4">실패해도 괜찮습니다</h2>
<div class="highlight">
오늘의 목표는 "완성"이 아니라 "경험"입니다
</div>
<p><strong>좋은 경험</strong>:</p>
<ul>
<li>✓ Agent한테 시켜봤다</li>
<li>✓ 프롬프트를 여러 번 고쳐봤다</li>
<li>✓ Plan 모드를 써봤다</li>
<li>✓ 안 되는 걸 알아봤다</li>
</ul>
<p><strong>상관없는 것</strong>:</p>
<ul>
<li>✗ 완성 여부</li>
<li>✗ 코드 품질</li>
<li>✗ 디자인</li>
<li>✗ 다른 사람과 비교</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="134" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="134" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="30%EB%B6%84-%EC%9E%91%EC%97%85-%EC%8B%9C%EC%9E%91">30분 작업 시작!</h2>
<p><strong>타이머 시작</strong></p>
<p><strong>참가자 여러분</strong>:</p>
<ul>
<li>하고 싶은 것 자유롭게</li>
<li>막히면 언제든 손들기</li>
<li>실패해도 괜찮아요</li>
<li>Agent를 마음껏 경험하세요!</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="135" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="135" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="30%EB%B6%84-%ED%9B%84-%EC%9E%91%EC%97%85-%EC%A2%85%EB%A3%8C">(30분 후) 작업 종료</h2>
<p><strong>수고하셨습니다!</strong></p>
<p>완성 여부와 상관없이,<br />
Agent와 함께 30분을 보내셨습니다.</p>
<p><strong>잠깐 쉬면서</strong>:</p>
<ul>
<li>만든 것 저장 확인</li>
<li>프롬프트 기록 확인</li>
<li>숨 고르기</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="136" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="136" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%EC%84%A0%ED%83%9D%EC%A0%81-%EA%B3%B5%EC%9C%A0-5%EB%B6%84">선택적 공유 (5분)</h2>
<p><strong>공유하고 싶은 분만!</strong></p>
<p>간단히 한 줄로:</p>
<ul>
<li>&quot;무엇을 만들려고 했고&quot;</li>
<li>&quot;어떻게 됐는지&quot;</li>
</ul>
<p><strong>성공/실패 무관</strong>:</p>
<ul>
<li>&quot;이렇게 했더니 됐어요&quot;</li>
<li>&quot;이렇게 했는데 안 됐어요&quot;</li>
<li>&quot;이런 걸 배웠어요&quot;</li>
</ul>
<p><strong>시간</strong>: 1인당 30초~1분</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="137" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="137" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="ai%EB%8A%94-%EC%99%84%EB%B2%BD%ED%95%98%EC%A7%80-%EC%95%8A%EB%8B%A4">AI는 완벽하지 않다</h2>
<h3 id="%ED%9D%94%ED%95%9C-%EB%AC%B8%EC%A0%9C%EB%93%A4">흔한 문제들</h3>
<table>
<thead>
<tr>
<th>유형</th>
<th>설명</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>논리적 오류</strong></td>
<td>문법은 맞지만 논리가 틀림</td>
</tr>
<tr>
<td><strong>오래된 방식</strong></td>
<td>비효율적이거나 폐기된 코드</td>
</tr>
<tr>
<td><strong>할루시네이션</strong></td>
<td>존재하지 않는 함수/라이브러리 사용</td>
</tr>
</tbody>
</table>
<h3 id="%ED%95%B5%EC%8B%AC-%EC%9B%90%EC%B9%99">핵심 원칙</h3>
<blockquote>
<p><strong>&quot;AI를 믿되, 검증하라&quot;</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="138" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="138" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="ai%EA%B0%80-%EC%83%9D%EC%84%B1%ED%95%9C-%EC%BD%94%EB%93%9C-%EA%B2%80%ED%86%A0">AI가 생성한 코드 검토</h2>
<h3 id="3%EB%8B%A8%EA%B3%84-%EA%B2%80%ED%86%A0-%ED%94%84%EB%A1%9C%EC%84%B8%EC%8A%A4">3단계 검토 프로세스</h3>
<table>
<thead>
<tr>
<th>단계</th>
<th>확인 사항</th>
<th>방법</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>1. 실행</strong></td>
<td>코드가 동작하는가?</td>
<td><code>node 파일.js</code></td>
</tr>
<tr>
<td><strong>2. 결과</strong></td>
<td>예상한 결과가 나오는가?</td>
<td>직접 테스트</td>
</tr>
<tr>
<td><strong>3. 이해</strong></td>
<td>코드가 무슨 일을 하는지 이해되는가?</td>
<td>AI에게 설명 요청</td>
</tr>
</tbody>
</table>
<h3 id="%EC%BD%94%EB%93%9C-%EC%84%A4%EB%AA%85-%EC%9A%94%EC%B2%AD">코드 설명 요청</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>이 코드가 어떻게 작동하는지 한 줄씩 설명해줘:

[코드 붙여넣기]
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="139" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="139" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="%ED%9D%94%ED%95%9C-%EC%97%90%EB%9F%AC%EC%99%80-%ED%95%B4%EA%B2%B0%EB%B2%95">흔한 에러와 해결법</h2>
<h3 id="%EC%9E%90%EC%A3%BC-%EB%B0%9C%EC%83%9D%ED%95%98%EB%8A%94-%EC%97%90%EB%9F%AC">자주 발생하는 에러</h3>
<table>
<thead>
<tr>
<th>에러 메시지</th>
<th>원인</th>
<th>해결책</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>Cannot find module</code></td>
<td>패키지 미설치</td>
<td><code>npm install 패키지명</code></td>
</tr>
<tr>
<td><code>SyntaxError</code></td>
<td>문법 오류</td>
<td>AI에게 수정 요청</td>
</tr>
<tr>
<td><code>ENOENT: no such file</code></td>
<td>파일/폴더 없음</td>
<td>경로 확인</td>
</tr>
<tr>
<td><code>TypeError</code></td>
<td>타입 오류</td>
<td>AI에게 질문</td>
</tr>
<tr>
<td><code>EADDRINUSE</code></td>
<td>포트 사용 중</td>
<td>다른 포트 사용</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="140" data-paginate="true" data-theme="default" lang="ko-KR" data-marpit-pagination="140" style="--paginate:true;--theme:default;" data-marpit-pagination-total="155" data-size="16:9">
<h2 id="agent%EC%97%90%EA%B2%8C-%EC%97%90%EB%9F%AC-%ED%95%B4%EA%B2%B0-%EB%A7%A1%EA%B8%B0%EA%B8%B0">Agent에게 에러 해결 맡기기</h2>
