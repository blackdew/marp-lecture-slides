<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 600 960">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfe6e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="-80" width="600" height="960" fill="url(#bgGrad)" rx="0"/>

  <!-- Central AI Agent Icon -->
  <circle cx="300" cy="280" r="90" fill="#3498db" opacity="0.15"/>
  <circle cx="300" cy="280" r="65" fill="#3498db" opacity="0.25"/>
  <circle cx="300" cy="280" r="45" fill="#3498db"/>

  <!-- Brain/AI symbol inside -->
  <path d="M280 270 Q280 255 295 255 Q305 250 310 260 Q320 255 325 265 Q330 275 320 280 Q325 290 315 295 Q305 300 295 295 Q285 300 280 290 Q275 280 280 270Z" fill="white" opacity="0.9"/>

  <!-- Orbiting elements - Tools -->
  <!-- File icon -->
  <g transform="translate(200, 180)">
    <rect x="-18" y="-22" width="36" height="44" rx="4" fill="#2ecc71"/>
    <line x1="-8" y1="-10" x2="8" y2="-10" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="6" x2="4" y2="6" stroke="white" stroke-width="2"/>
  </g>

  <!-- Code icon -->
  <g transform="translate(400, 180)">
    <rect x="-22" y="-18" width="44" height="36" rx="4" fill="#e74c3c"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="18" font-family="monospace">&lt;/&gt;</text>
  </g>

  <!-- Chat icon -->
  <g transform="translate(200, 380)">
    <rect x="-22" y="-16" width="44" height="32" rx="16" fill="#f39c12"/>
    <circle cx="-8" cy="0" r="3" fill="white"/>
    <circle cx="0" cy="0" r="3" fill="white"/>
    <circle cx="8" cy="0" r="3" fill="white"/>
  </g>

  <!-- Gear icon -->
  <g transform="translate(400, 380)">
    <circle cx="0" cy="0" r="16" fill="#9b59b6"/>
    <circle cx="0" cy="0" r="8" fill="#dfe6e9"/>
    <rect x="-3" y="-22" width="6" height="10" rx="2" fill="#9b59b6"/>
    <rect x="-3" y="12" width="6" height="10" rx="2" fill="#9b59b6"/>
    <rect x="-22" y="-3" width="10" height="6" rx="2" fill="#9b59b6"/>
    <rect x="12" y="-3" width="10" height="6" rx="2" fill="#9b59b6"/>
  </g>

  <!-- Connecting lines -->
  <line x1="245" y1="230" x2="260" y2="255" stroke="#3498db" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="355" y1="230" x2="340" y2="255" stroke="#3498db" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="245" y1="340" x2="260" y2="310" stroke="#3498db" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="355" y1="340" x2="340" y2="310" stroke="#3498db" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- Title text -->
  <text x="300" y="500" text-anchor="middle" font-size="36" font-weight="bold" fill="#2c3e50" font-family="sans-serif">Just Plan It!!</text>
  <text x="300" y="545" text-anchor="middle" font-size="16" fill="#7f8c8d" font-family="sans-serif">AI Agent로 시작하는</text>
  <text x="300" y="570" text-anchor="middle" font-size="16" fill="#7f8c8d" font-family="sans-serif">일과 삶의 전환</text>

  <!-- Bottom decorative line -->
  <line x1="200" y1="610" x2="400" y2="610" stroke="#3498db" stroke-width="2" opacity="0.3"/>

  <!-- University badge -->
  <rect x="210" y="640" width="180" height="36" rx="18" fill="#3498db" opacity="0.1"/>
  <text x="300" y="664" text-anchor="middle" font-size="14" fill="#3498db" font-family="sans-serif">동명대학교 특강</text>
</svg>